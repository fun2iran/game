<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>نقاشی و حدس گروهی | MQTT</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background:#1e1e2f; color:#fff; font-family:'Segoe UI',Tahoma,sans-serif;
      height:100dvh; display:flex; flex-direction:column; overflow:hidden; touch-action:manipulation;
    }
    .login {
      position:fixed; top:0; left:0; right:0; bottom:0; background:#1e1e2f; display:flex;
      flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:15px;
    }
    .login h2 { color:#ffb86c; }
    .login input {
      padding:12px 20px; border-radius:30px; border:none; background:#3a3a5a; color:#fff;
      width:220px; text-align:center; font-size:16px;
    }
    .login button {
      padding:12px 30px; border-radius:30px; border:none; background:#7c5cfc;
      color:#fff; font-weight:bold; cursor:pointer; font-size:16px;
    }
    #app { display:none; flex-direction:column; height:100%; padding:8px; }
    .top-bar {
      display:flex; align-items:center; justify-content:space-between; background:#2d2d44;
      padding:10px; border-radius:12px; margin-bottom:8px; font-size:14px; flex-wrap:wrap;
    }
    .status { color:#ffb86c; }
    .game-info {
      font-size:14px; text-align:center; margin:4px 0; display:flex; justify-content:space-between; align-items:center;
    }
    canvas {
      background:#fff; border-radius:12px; touch-action:none; width:100%; flex:1; display:block; margin-bottom:8px; min-height:0;
    }
    .tools {
      display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;
    }
    .tools input[type="color"] { width:40px; height:40px; border:none; background:none; }
    .tools input[type="range"] { flex:1; }
    button {
      background:#7c5cfc; color:#fff; border:none; border-radius:8px; padding:8px 12px;
      font-weight:bold; cursor:pointer; white-space:nowrap;
    }
    button:disabled { opacity:0.5; cursor:default; }
    .chat-area {
      background:#2d2d44; border-radius:12px; padding:8px; display:flex; flex-direction:column;
      max-height:25vh; min-height:120px;
    }
    .messages { flex:1; overflow-y:auto; margin-bottom:8px; font-size:14px; }
    .message {
      margin-bottom:4px; padding:4px 8px; background:#3a3a5a; border-radius:8px; word-break:break-word;
    }
    .message.self { background:#5a4a8a; text-align:left; }
    .chat-input { display:flex; gap:6px; }
    .chat-input input {
      flex:1; padding:10px; border-radius:8px; border:none; background:#3a3a5a; color:#fff;
    }
    .user-chip {
      background:#2a3942; padding:4px 12px; border-radius:20px; font-size:12px; margin:2px; white-space:nowrap;
    }
    .drawer-chip { background:#7c5cfc; }
    #requestDrawBtn { margin:0 8px; }
    .timer { color:#ffb86c; font-weight:bold; }
  </style>
</head>
<body>

<div id="loginBox" class="login">
  <h2>🎨 نقاشی و حدس گروهی</h2>
  <input type="text" id="roomInput" placeholder="شناسه اتاق (پیش‌فرض doodle_room)" autocomplete="off">
  <input type="text" id="nameInput" placeholder="نام شما" autocomplete="off">
  <button id="startBtn">ورود به اتاق</button>
</div>

<div id="app">
  <div class="top-bar">
    <span class="status" id="statusLabel">در حال اتصال...</span>
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
      <button id="requestDrawBtn">🎨 من می‌خواهم نقاشی کنم</button>
      <span id="drawerTimer" class="timer"></span>
    </div>
    <div id="usersContainer" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
  </div>
  <div class="game-info">
    <span id="roleDisplay"></span>
    <span id="wordDisplay" style="font-weight:bold; color:#ffb86c;"></span>
    <span id="scoreDisplay">🏆 0</span>
  </div>
  <canvas id="drawCanvas"></canvas>
  <div class="tools" id="toolbar">
    <input type="color" id="colorPicker" value="#000000">
    <input type="range" id="brushSize" min="2" max="20" value="4">
    <button id="clearBtn">پاک کردن</button>
  </div>
  <div class="chat-area">
    <div class="messages" id="messageContainer"></div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="حدس بزن یا چت کن..." autocomplete="off">
      <button id="sendBtn">ارسال</button>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- کلمات ----------
    const WORDS = ['سیب','موز','ماشین','گربه','خانه','درخت','آفتاب','ماهی','گل','کتاب','قلب','ستاره','پیتزا','هواپیما','ساعت','فیل','موبایل','عینک','مداد','کفش'];

    // ---------- عناصر DOM ----------
    const loginBox = document.getElementById('loginBox');
    const roomInput = document.getElementById('roomInput');
    const nameInput = document.getElementById('nameInput');
    const startBtn = document.getElementById('startBtn');
    const app = document.getElementById('app');
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const brushSize = document.getElementById('brushSize');
    const clearBtn = document.getElementById('clearBtn');
    const toolbar = document.getElementById('toolbar');
    const messageContainer = document.getElementById('messageContainer');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusLabel = document.getElementById('statusLabel');
    const roleDisplay = document.getElementById('roleDisplay');
    const wordDisplay = document.getElementById('wordDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const usersContainer = document.getElementById('usersContainer');
    const requestDrawBtn = document.getElementById('requestDrawBtn');
    const drawerTimer = document.getElementById('drawerTimer');

    // ---------- متغیرها ----------
    const USER_ID = 'u' + Math.random().toString(36).substr(2, 9); // شناسه یکتا
    let myName = '', roomId = 'doodle_room';
    let mqttClient = null;

    // کاربران حاضر در اتاق: Map<userId, { name }>
    const roomUsers = new Map();

    // نقاش
    let currentDrawer = null; // { userId, name, startTime }
    let isDrawer = false;
    let drawerTimerInterval = null;
    const DRAW_TIME = 120; // ثانیه

    let currentWord = '';
    let myScore = 0;
    let drawing = false;
    let lastX, lastY;

    // ---------- بوم ----------
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      canvas.width = rect.width;
      canvas.height = rect.height;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function setDrawToolsEnabled(enabled) {
      toolbar.style.display = enabled ? 'flex' : 'none';
    }

    function startDrawing(e) {
      if (!isDrawer) return;
      e.preventDefault();
      drawing = true;
      const pos = getCanvasCoords(e);
      lastX = pos.x; lastY = pos.y;
      ctx.beginPath(); ctx.moveTo(lastX, lastY);
      publishDrawing('start', lastX, lastY);
    }

    function draw(e) {
      if (!drawing || !isDrawer) return;
      e.preventDefault();
      const pos = getCanvasCoords(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = colorPicker.value;
      ctx.lineWidth = brushSize.value;
      ctx.stroke();
      publishDrawing('move', pos.x, pos.y);
      lastX = pos.x; lastY = pos.y;
    }

    function endDrawing(e) {
      if (!isDrawer) return;
      drawing = false;
      ctx.closePath();
      publishDrawing('end');
    }

    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function publishDrawing(drawType, x, y) {
      if (!mqttClient || !mqttClient.connected) return;
      const topic = `doodle/${roomId}/draw`;
      mqttClient.publish(topic, JSON.stringify({
        type: 'draw',
        drawType,
        x, y,
        color: colorPicker.value,
        size: brushSize.value,
        userId: USER_ID
      }));
    }

    function handleRemoteDraw(data) {
      if (isDrawer || data.userId === USER_ID) return; // نقاشی خودم را نادیده بگیر
      if (canvas.width === 0 || canvas.height === 0) {
        resizeCanvas();
        if (canvas.width === 0 || canvas.height === 0) return;
      }
      ctx.strokeStyle = data.color;
      ctx.lineWidth = data.size;
      if (data.drawType === 'start') {
        ctx.beginPath(); ctx.moveTo(data.x, data.y);
      } else if (data.drawType === 'move') {
        ctx.lineTo(data.x, data.y); ctx.stroke();
      } else if (data.drawType === 'end') {
        ctx.closePath();
      }
    }

    function clearCanvas(send = true) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (send && isDrawer && mqttClient) {
        mqttClient.publish(`doodle/${roomId}/draw`, JSON.stringify({ type:'clear', userId: USER_ID }));
      }
    }
    clearBtn.addEventListener('click', () => clearCanvas());

    // همگام‌سازی بوم برای تازه‌واردها
    function sendCanvasSync() {
      if (!isDrawer || !mqttClient) return;
      try {
        const dataUrl = canvas.toDataURL('image/png');
        mqttClient.publish(`doodle/${roomId}/draw`, JSON.stringify({
          type: 'canvas_sync',
          image: dataUrl,
          userId: USER_ID
        }));
      } catch(e) {}
    }

    // ---------- منطق نقاش ----------
    function pickNewWord() {
      currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
      wordDisplay.textContent = isDrawer ? `🎨 کلمه تو: ${currentWord}` : '';
    }

    function becomeDrawer() {
      if (isDrawer || currentDrawer) return;
      isDrawer = true;
      const now = Date.now();
      currentDrawer = { userId: USER_ID, name: myName, startTime: now };
      clearCanvas(true);
      pickNewWord();
      setDrawToolsEnabled(true);
      roleDisplay.textContent = '🖌️ تو نقاشی';
      requestDrawBtn.disabled = true;
      requestDrawBtn.textContent = '🎨 در حال نقاشی...';
      startDrawerTimer();
      // انتشار وضعیت نقاش (retained)
      publishDrawerState(currentDrawer);
      // انتشار پیام فعال شدن نقاش برای همه
      mqttClient.publish(`doodle/${roomId}/drawer`, JSON.stringify(currentDrawer), { retain: true });
    }

    function resignDrawer() {
      if (!isDrawer) return;
      isDrawer = false;
      currentDrawer = null;
      clearCanvas(true);
      setDrawToolsEnabled(false);
      roleDisplay.textContent = '🔍 حدس بزن';
      wordDisplay.textContent = '';
      stopDrawerTimer();
      requestDrawBtn.disabled = false;
      requestDrawBtn.textContent = '🎨 من می‌خواهم نقاشی کنم';
      publishDrawerState(null);
      mqttClient.publish(`doodle/${roomId}/drawer`, '', { retain: true });
    }

    function startDrawerTimer() {
      let remaining = DRAW_TIME;
      drawerTimer.textContent = `⏱ ${formatTime(remaining)}`;
      if (drawerTimerInterval) clearInterval(drawerTimerInterval);
      drawerTimerInterval = setInterval(() => {
        remaining--;
        drawerTimer.textContent = `⏱ ${formatTime(remaining)}`;
        if (remaining <= 0) {
          clearInterval(drawerTimerInterval);
          drawerTimerInterval = null;
          addMessage('⏰ زمان نقاشی تمام شد.', 'system');
          resignDrawer();
        }
      }, 1000);
    }

    function stopDrawerTimer() {
      if (drawerTimerInterval) {
        clearInterval(drawerTimerInterval);
        drawerTimerInterval = null;
      }
      drawerTimer.textContent = '';
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function publishDrawerState(drawerObj) {
      if (!mqttClient || !mqttClient.connected) return;
      const topic = `doodle/${roomId}/drawer`;
      mqttClient.publish(topic, drawerObj ? JSON.stringify(drawerObj) : '', { retain: true });
    }

    function updateDrawerFromMessage(drawerObj) {
      if (!drawerObj || drawerObj.userId === USER_ID) return;
      currentDrawer = drawerObj;
      isDrawer = false;
      setDrawToolsEnabled(false);
      roleDisplay.textContent = `🖌️ ${drawerObj.name} نقاشی می‌کند`;
      wordDisplay.textContent = '';
      requestDrawBtn.disabled = true;
      requestDrawBtn.textContent = '🎨 نقاش فعال است';
      stopDrawerTimer();
      const elapsed = Math.floor((Date.now() - drawerObj.startTime) / 1000);
      const remaining = Math.max(DRAW_TIME - elapsed, 0);
      if (remaining > 0) {
        drawerTimer.textContent = `⏱ ${formatTime(remaining)}`;
        if (drawerTimerInterval) clearInterval(drawerTimerInterval);
        drawerTimerInterval = setInterval(() => {
          const newRemaining = Math.max(Math.floor((DRAW_TIME * 1000 - (Date.now() - drawerObj.startTime)) / 1000), 0);
          drawerTimer.textContent = `⏱ ${formatTime(newRemaining)}`;
          if (newRemaining <= 0) clearInterval(drawerTimerInterval);
        }, 1000);
      }
      updateUsersUI();
    }

    // ---------- امتیاز و حدس ----------
    function updateMyScoreDisplay() {
      scoreDisplay.textContent = `🏆 ${myScore}`;
    }

    function handleCorrectGuess(guesserId) {
      if (guesserId === USER_ID) {
        myScore++;
        updateMyScoreDisplay();
        addMessage('✅ حدس درست! یک امتیاز گرفتی.', 'system');
      }
      if (currentDrawer && currentDrawer.userId === USER_ID) {
        myScore++;
        updateMyScoreDisplay();
        addMessage('🎯 یک نفر درست حدس زد، تو هم امتیاز گرفتی.', 'system');
      }
      // انتشار امتیاز (اختیاری)
    }

    // ---------- چت ----------
    function addMessage(text, sender = 'other') {
      const div = document.createElement('div');
      div.className = `message ${sender === 'self' ? 'self' : ''}`;
      div.textContent = text;
      messageContainer.appendChild(div);
      messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    function sendChat(text) {
      if (!mqttClient) return;
      mqttClient.publish(`doodle/${roomId}/chat`, JSON.stringify({
        type: 'chat',
        text,
        userId: USER_ID,
        name: myName
      }));
      addMessage(text, 'self');
      // بررسی حدس
      if (!isDrawer && currentDrawer && text.trim().toLowerCase() === currentWord.toLowerCase()) {
        handleCorrectGuess(USER_ID);
        mqttClient.publish(`doodle/${roomId}/chat`, JSON.stringify({
          type: 'correct_guess',
          guesserId: USER_ID,
          guesserName: myName
        }));
      }
    }

    sendBtn.addEventListener('click', () => {
      const text = chatInput.value.trim();
      if (text) { sendChat(text); chatInput.value = ''; }
    });
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

    // ---------- MQTT: مدیریت پیام‌ها ----------
    function onMqttMessage(topic, message) {
      const payload = message.toString();
      if (!payload) return;

      // چت
      if (topic === `doodle/${roomId}/chat`) {
        try {
          const data = JSON.parse(payload);
          if (data.type === 'chat' && data.userId !== USER_ID) {
            addMessage(`${data.text}`, 'other');
            // حدس خودکار توسط دیگران بررسی نمی‌شود چون فقط خود فرد می‌داند حدس زده یا نه
          } else if (data.type === 'correct_guess') {
            if (data.guesserId !== USER_ID) {
              // یک نفر درست حدس زده
              if (isDrawer) {
                handleCorrectGuess(data.guesserId);
              }
              addMessage(`🎉 ${data.guesserName} درست حدس زد!`, 'system');
            }
          }
        } catch(e) {}
      }
      // نقاشی
      else if (topic === `doodle/${roomId}/draw`) {
        try {
          const data = JSON.parse(payload);
          if (data.type === 'draw') {
            handleRemoteDraw(data);
          } else if (data.type === 'clear') {
            if (data.userId !== USER_ID) clearCanvas(false);
          } else if (data.type === 'canvas_sync') {
            // دریافت تصویر کامل بوم
            if (!isDrawer && data.image) {
              const img = new Image();
              img.onload = () => {
                if (canvas.width > 0 && canvas.height > 0) {
                  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                }
              };
              img.src = data.image;
            }
          }
        } catch(e) {}
      }
      // حضور کاربران
      else if (topic.startsWith(`doodle/${roomId}/presence/`)) {
        try {
          const user = JSON.parse(payload);
          if (user.userId && user.userId !== USER_ID) {
            if (!roomUsers.has(user.userId)) {
              roomUsers.set(user.userId, { name: user.name });
              updateUsersUI();
              // اگر من نقاش هستم، برای کاربر جدید بوم را همگام کن
              if (isDrawer) {
                sendCanvasSync();
              }
            }
          }
        } catch(e) {}
        // مدیریت خروج کاربر (پیام خالی)
        if (payload === '') {
          const userId = topic.split('/').pop();
          if (roomUsers.has(userId)) {
            roomUsers.delete(userId);
            updateUsersUI();
          }
        }
      }
      // وضعیت نقاش (retained)
      else if (topic === `doodle/${roomId}/drawer`) {
        if (payload) {
          try {
            const drawer = JSON.parse(payload);
            if (drawer.userId !== USER_ID) {
              updateDrawerFromMessage(drawer);
            }
          } catch(e) {}
        } else {
          // نقاشی تمام شده
          if (!isDrawer) {
            currentDrawer = null;
            roleDisplay.textContent = '🔍 حدس بزن';
            requestDrawBtn.disabled = false;
            requestDrawBtn.textContent = '🎨 من می‌خواهم نقاشی کنم';
            stopDrawerTimer();
            updateUsersUI();
          }
        }
      }
    }

    function publishMyPresence() {
      if (!mqttClient || !mqttClient.connected) return;
      const topic = `doodle/${roomId}/presence/${USER_ID}`;
      mqttClient.publish(topic, JSON.stringify({ userId: USER_ID, name: myName }), { retain: true });
    }

    function removeMyPresence() {
      if (!mqttClient || !mqttClient.connected) return;
      mqttClient.publish(`doodle/${roomId}/presence/${USER_ID}`, '', { retain: true });
    }

    function initMqtt() {
      mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
      mqttClient.on('connect', () => {
        statusLabel.innerText = '✅ متصل به اتاق';
        // اشتراک در کانال‌ها
        mqttClient.subscribe(`doodle/${roomId}/chat`);
        mqttClient.subscribe(`doodle/${roomId}/draw`);
        mqttClient.subscribe(`doodle/${roomId}/presence/+`);
        mqttClient.subscribe(`doodle/${roomId}/drawer`);
        mqttClient.on('message', onMqttMessage);
        // انتشار حضور
        publishMyPresence();
        requestDrawBtn.disabled = false;
      });
      mqttClient.on('close', () => {
        statusLabel.innerText = '⚠️ قطع MQTT';
        removeMyPresence();
      });
      window.addEventListener('beforeunload', () => {
        removeMyPresence();
        if (mqttClient && mqttClient.connected) mqttClient.end();
      });
    }

    // ---------- رابط کاربری ----------
    function updateUsersUI() {
      usersContainer.innerHTML = `<span class="user-chip">👤 ${myName} (من)</span>`;
      roomUsers.forEach((user, userId) => {
        usersContainer.innerHTML += `<span class="user-chip">👤 ${user.name}</span>`;
      });
      // نقاش را برجسته کن
      if (currentDrawer) {
        const chips = usersContainer.querySelectorAll('.user-chip');
        chips.forEach(chip => {
          if (chip.textContent.includes(currentDrawer.name)) {
            chip.classList.add('drawer-chip');
          }
        });
      }
    }

    requestDrawBtn.addEventListener('click', () => {
      if (isDrawer || currentDrawer) return;
      becomeDrawer();
    });

    startBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return alert('نام خود را وارد کنید');
      myName = name;
      roomId = roomInput.value.trim() || 'doodle_room';
      loginBox.style.display = 'none';
      app.style.display = 'flex';
      resizeCanvas(); // تنظیم دوباره بعد از نمایش
      initMqtt();
      updateUsersUI();
    });

    // رویدادهای نقاشی
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDrawing);
    canvas.addEventListener('mouseleave', endDrawing);
    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDrawing);

    setDrawToolsEnabled(false);
    roleDisplay.textContent = 'منتظر اتصال...';
  })();
</script>
</body>
</html>
