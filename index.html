<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>نقاشی گروهی | امتیاز بر اساس زمان | MQTT</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background:#1e1e2f; color:#fff; font-family:'Segoe UI',Tahoma,sans-serif;
      height:100dvh; display:flex; flex-direction:column; overflow:hidden; touch-action:manipulation;
    }
    .login {
      position:fixed; top:0; left:0; right:0; bottom:0; background:#1e1e2f; display:flex;
      flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:15px;
    }
    .login h2 { color:#ffb86c; }
    .login input {
      padding:12px 20px; border-radius:30px; border:none; background:#3a3a5a; color:#fff;
      width:220px; text-align:center; font-size:16px;
    }
    .login button {
      padding:12px 30px; border-radius:30px; border:none; background:#7c5cfc;
      color:#fff; font-weight:bold; cursor:pointer; font-size:16px;
    }
    #app { display:none; flex-direction:column; height:100%; padding:8px; }
    .top-bar {
      display:flex; align-items:center; justify-content:space-between; background:#2d2d44;
      padding:10px; border-radius:12px; margin-bottom:8px; font-size:14px; flex-wrap:wrap;
    }
    .status { color:#ffb86c; }
    .game-info {
      font-size:14px; text-align:center; margin:4px 0; display:flex; justify-content:space-between; align-items:center;
    }
    canvas {
      background:#fff; border-radius:12px; touch-action:none; width:100%; flex:1; display:block; margin-bottom:8px; min-height:0;
    }
    .tools {
      display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;
    }
    .tools input[type="color"] { width:40px; height:40px; border:none; background:none; }
    .tools input[type="range"] { flex:1; }
    button {
      background:#7c5cfc; color:#fff; border:none; border-radius:8px; padding:8px 12px;
      font-weight:bold; cursor:pointer; white-space:nowrap;
    }
    button:disabled { opacity:0.5; cursor:default; }
    .chat-area {
      background:#2d2d44; border-radius:12px; padding:8px; display:flex; flex-direction:column;
      max-height:25vh; min-height:120px;
    }
    .messages { flex:1; overflow-y:auto; margin-bottom:8px; font-size:14px; }
    .message {
      margin-bottom:4px; padding:4px 8px; background:#3a3a5a; border-radius:8px; word-break:break-word;
    }
    .message.self { background:#5a4a8a; text-align:left; }
    .message.system { background:#2d4a5a; text-align:center; font-style:italic; }
    .chat-input { display:flex; gap:6px; }
    .chat-input input {
      flex:1; padding:10px; border-radius:8px; border:none; background:#3a3a5a; color:#fff;
    }
    .users-container {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .user-chip {
      background:#2a3942; padding:4px 12px; border-radius:20px; font-size:12px; margin:2px; white-space:nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .user-chip .score {
      font-weight: bold;
      background: #1e1e2f;
      border-radius: 12px;
      padding: 0 6px;
      margin-right: 4px;
    }
    .drawer-chip { background:#7c5cfc; }
    .host-chip { background:#ffb86c; color:#1e1e2f; }
    #requestDrawBtn.in-queue { background:#ff8c5c; }
    .timer { color:#ffb86c; font-weight:bold; }
    .queue-info { font-size:12px; color:#aaa; margin-right:8px; }
  </style>
</head>
<body>

<div id="loginBox" class="login">
  <h2>🎨 نقاشی گروهی | امتیاز سریع</h2>
  <input type="text" id="roomInput" placeholder="شناسه اتاق (پیش‌فرض doodle_room)" autocomplete="off">
  <input type="text" id="nameInput" placeholder="نام شما" autocomplete="off">
  <button id="startBtn">ورود به اتاق</button>
</div>

<div id="app">
  <div class="top-bar">
    <span class="status" id="statusLabel">در حال اتصال...</span>
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
      <button id="requestDrawBtn">🎨 من می‌خواهم نقاشی کنم</button>
      <span id="drawerTimer" class="timer"></span>
    </div>
    <div id="usersContainer" class="users-container"></div>
  </div>
  <div class="game-info">
    <span id="roleDisplay"></span>
    <span id="wordDisplay" style="font-weight:bold; color:#ffb86c;"></span>
    <span id="scoreDisplay">🏆 0</span>
  </div>
  <canvas id="drawCanvas"></canvas>
  <div class="tools" id="toolbar">
    <input type="color" id="colorPicker" value="#000000">
    <input type="range" id="brushSize" min="2" max="20" value="4">
    <button id="clearBtn">پاک کردن</button>
  </div>
  <div class="chat-area">
    <div class="messages" id="messageContainer"></div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="حدس بزن یا چت کن..." autocomplete="off">
      <button id="sendBtn">ارسال</button>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- تنظیمات ----------
    const WORDS = ['سیب','موز','ماشین','گربه','خانه','درخت','آفتاب','ماهی','گل','کتاب','قلب','ستاره','پیتزا','هواپیما','ساعت','فیل','موبایل','عینک','مداد','کفش'];
    const DRAW_TIME = 120; // ثانیه
    const HEARTBEAT_INTERVAL = 2000;
    const HEARTBEAT_TIMEOUT = 10000;
    const THROTTLE_MS = 30;

    // ---------- عناصر DOM ----------
    const loginBox = document.getElementById('loginBox');
    const roomInput = document.getElementById('roomInput');
    const nameInput = document.getElementById('nameInput');
    const startBtn = document.getElementById('startBtn');
    const app = document.getElementById('app');
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const brushSize = document.getElementById('brushSize');
    const clearBtn = document.getElementById('clearBtn');
    const toolbar = document.getElementById('toolbar');
    const messageContainer = document.getElementById('messageContainer');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusLabel = document.getElementById('statusLabel');
    const roleDisplay = document.getElementById('roleDisplay');
    const wordDisplay = document.getElementById('wordDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const usersContainer = document.getElementById('usersContainer');
    const requestDrawBtn = document.getElementById('requestDrawBtn');
    const drawerTimer = document.getElementById('drawerTimer');

    // ---------- متغیرهای اصلی ----------
    const USER_ID = 'u' + Math.random().toString(36).substr(2, 9);
    let myName = '', roomId = 'doodle_room';
    let mqttClient = null;
    let joinTime = Date.now();

    // کاربران: Map<userId, { name, joinTime, lastHeartbeat, timer }>
    const roomUsers = new Map();
    // امتیاز کاربران
    const userScores = new Map();

    let currentDrawer = null;
    let isDrawer = false;
    let drawerTimerInterval = null;

    let drawQueue = [];
    let isHost = false;
    let hostId = null;

    let chatHistory = [];
    const MAX_HISTORY = 20;

    let currentWord = '';
    let drawing = false;
    let lastX, lastY;

    let pendingDrawData = null;
    let throttleTimer = null;
    let heartbeatInterval = null;

    // ---------- توابع کمکی ----------
    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function addMessageToUI(text, type = 'other', senderName = '') {
      const div = document.createElement('div');
      div.className = `message ${type === 'self' ? 'self' : ''} ${type === 'system' ? 'system' : ''}`;
      if (type === 'system') div.textContent = `🔹 ${text}`;
      else if (type === 'self') div.textContent = text;
      else div.textContent = `${senderName ? senderName+': ' : ''}${text}`;
      messageContainer.appendChild(div);
      messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    function addMessageToHistory(text, senderName, isSystem = false, timestamp = Date.now()) {
      chatHistory.unshift({ text, senderName, isSystem, timestamp });
      if (chatHistory.length > MAX_HISTORY) chatHistory.pop();
    }

    function addMessage(text, sender = 'other', senderName = '') {
      if (sender === 'self') addMessageToUI(text, 'self');
      else if (sender === 'system') addMessageToUI(text, 'system');
      else addMessageToUI(text, 'other', senderName);
      addMessageToHistory(text, sender === 'self' ? myName : senderName, sender === 'system');
    }

    function loadHistoryToUI() {
      messageContainer.innerHTML = '';
      [...chatHistory].reverse().forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.isSystem ? 'system' : ''}`;
        if (msg.isSystem) div.textContent = `🔹 ${msg.text}`;
        else div.textContent = `${msg.senderName}: ${msg.text}`;
        messageContainer.appendChild(div);
      });
      messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    // ---------- مدیریت امتیاز و لیست کاربران ----------
    function updateMyScoreDisplay() {
      const myScore = userScores.get(USER_ID) || 0;
      scoreDisplay.textContent = `🏆 ${myScore}`;
    }

    function updateUsersUI() {
      // ساخت آرایه از همه کاربران (خودم + دیگران) با امتیاز
      const usersList = [];
      // خود کاربر
      usersList.push({ id: USER_ID, name: myName, score: userScores.get(USER_ID) || 0, isSelf: true });
      for (let [uid, info] of roomUsers.entries()) {
        if (uid !== USER_ID) {
          usersList.push({ id: uid, name: info.name, score: userScores.get(uid) || 0, isSelf: false });
        }
      }
      // مرتب سازی بر اساس امتیاز نزولی (و سپس نام)
      usersList.sort((a,b) => b.score - a.score || a.name.localeCompare(b.name));
      
      // ساخت HTML
      usersContainer.innerHTML = '';
      for (let u of usersList) {
        let chipClass = 'user-chip';
        if (currentDrawer && currentDrawer.userId === u.id) chipClass += ' drawer-chip';
        if (hostId === u.id) chipClass += ' host-chip';
        const scoreSpan = `<span class="score">${u.score}</span>`;
        const nameSpan = `${u.name}${u.isSelf ? ' (من)' : ''}`;
        usersContainer.innerHTML += `<div class="${chipClass}">${nameSpan} ${scoreSpan}</div>`;
      }
    }

    // به‌روزرسانی امتیاز دو کاربر (حدس‌زننده و نقاش) پس از حدس درست
    function awardScores(guesserId, drawerId, remainingSeconds) {
      const oldGuesserScore = userScores.get(guesserId) || 0;
      const oldDrawerScore = userScores.get(drawerId) || 0;
      userScores.set(guesserId, oldGuesserScore + remainingSeconds);
      userScores.set(drawerId, oldDrawerScore + remainingSeconds);
      updateMyScoreDisplay();
      updateUsersUI();
      // نمایش پیام امتیاز در سیستم
      if (guesserId === USER_ID) {
        addMessage(`✅ حدس درست! +${remainingSeconds} امتیاز`, 'system');
      }
      if (drawerId === USER_ID && guesserId !== USER_ID) {
        addMessage(`🎯 کاربر ${userScores.get(guesserId)?.name || ''} حدس زد! +${remainingSeconds} امتیاز`, 'system');
      }
    }

    // تابع پایان نقاشی (با دلیل: حدس درست یا اتمام زمان)
    function finishDrawing(byCorrectGuess = false, guesserId = null, remaining = 0) {
      if (isDrawer) {
        resignDrawer(); // این تابع نقاش را خارج کرده و پیام drawer_finished می‌فرستد
      } else if (currentDrawer && !isDrawer) {
        // اگر نقاش دیگری است، فقط وضعیت را پاک کنیم و host را خبر دهیم
        if (currentDrawer.userId !== USER_ID) {
          currentDrawer = null;
          roleDisplay.textContent = '🔍 حدس بزن';
          requestDrawBtn.disabled = false;
          stopDrawerTimer();
          updateUsersUI();
          // host بعداً از صف نقاش بعدی را انتخاب می‌کند (با دریافت drawer_finished)
          if (mqttClient) {
            mqttClient.publish(`doodle/${roomId}/drawer_finished`, JSON.stringify({ userId: currentDrawer?.userId || '' }));
          }
        }
      }
    }

    // ---------- بوم و نقاشی ----------
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      canvas.width = rect.width;
      canvas.height = rect.height;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function setDrawToolsEnabled(enabled) {
      toolbar.style.display = enabled ? 'flex' : 'none';
    }

    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function sendDrawThrottled(drawType, x, y) {
      if (!mqttClient || !mqttClient.connected) return;
      pendingDrawData = { drawType, x, y, color: colorPicker.value, size: brushSize.value, userId: USER_ID };
      if (!throttleTimer) {
        throttleTimer = setTimeout(() => flushDrawThrottle(), THROTTLE_MS);
      }
    }

    function flushDrawThrottle() {
      if (throttleTimer) clearTimeout(throttleTimer);
      throttleTimer = null;
      if (pendingDrawData) {
        mqttClient.publish(`doodle/${roomId}/draw`, JSON.stringify({ type: 'draw', ...pendingDrawData }));
        pendingDrawData = null;
      }
    }

    function startDrawing(e) {
      if (!isDrawer) return;
      e.preventDefault();
      drawing = true;
      const pos = getCanvasCoords(e);
      lastX = pos.x; lastY = pos.y;
      ctx.beginPath(); ctx.moveTo(lastX, lastY);
      sendDrawThrottled('start', lastX, lastY);
    }

    function draw(e) {
      if (!drawing || !isDrawer) return;
      e.preventDefault();
      const pos = getCanvasCoords(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = colorPicker.value;
      ctx.lineWidth = brushSize.value;
      ctx.stroke();
      sendDrawThrottled('move', pos.x, pos.y);
      lastX = pos.x; lastY = pos.y;
    }

    function endDrawing(e) {
      if (!isDrawer) return;
      drawing = false;
      ctx.closePath();
      sendDrawThrottled('end');
      flushDrawThrottle();
    }

    function handleRemoteDraw(data) {
      if (isDrawer || data.userId === USER_ID) return;
      if (canvas.width === 0 || canvas.height === 0) resizeCanvas();
      ctx.strokeStyle = data.color;
      ctx.lineWidth = data.size;
      if (data.drawType === 'start') {
        ctx.beginPath(); ctx.moveTo(data.x, data.y);
      } else if (data.drawType === 'move') {
        ctx.lineTo(data.x, data.y); ctx.stroke();
      } else if (data.drawType === 'end') {
        ctx.closePath();
      }
    }

    function clearCanvas(send = true) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (send && isDrawer && mqttClient) {
        mqttClient.publish(`doodle/${roomId}/draw`, JSON.stringify({ type:'clear', userId: USER_ID }));
      }
    }
    clearBtn.addEventListener('click', () => clearCanvas());

    function sendCanvasSync() {
      if (!isDrawer || !mqttClient) return;
      try {
        const dataUrl = canvas.toDataURL('image/png');
        mqttClient.publish(`doodle/${roomId}/draw`, JSON.stringify({ type: 'canvas_sync', image: dataUrl, userId: USER_ID }));
      } catch(e) {}
    }

    // ---------- منطق نقاش و تایمر ----------
    function pickNewWord() {
      currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
      wordDisplay.textContent = isDrawer ? `🎨 کلمه تو: ${currentWord}` : '';
    }

    function becomeDrawer() {
      if (isDrawer || currentDrawer) return;
      isDrawer = true;
      const now = Date.now();
      currentDrawer = { userId: USER_ID, name: myName, startTime: now };
      clearCanvas(true);
      pickNewWord();
      setDrawToolsEnabled(true);
      roleDisplay.textContent = '🖌️ تو نقاشی';
      requestDrawBtn.disabled = true;
      requestDrawBtn.textContent = '🎨 در حال نقاشی...';
      startDrawerTimer(now);
      publishDrawerState(currentDrawer);
      setTimeout(() => sendCanvasSync(), 100);
    }

    function resignDrawer() {
      if (!isDrawer) return;
      isDrawer = false;
      currentDrawer = null;
      clearCanvas(true);
      setDrawToolsEnabled(false);
      roleDisplay.textContent = '🔍 حدس بزن';
      wordDisplay.textContent = '';
      stopDrawerTimer();
      requestDrawBtn.disabled = false;
      requestDrawBtn.textContent = '🎨 من می‌خواهم نقاشی کنم';
      publishDrawerState(null);
      mqttClient?.publish(`doodle/${roomId}/drawer_finished`, JSON.stringify({ userId: USER_ID }));
    }

    function startDrawerTimer(startTime) {
      stopDrawerTimer();
      const updateTimer = () => {
        if (!currentDrawer) return;
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const remaining = Math.max(DRAW_TIME - elapsed, 0);
        drawerTimer.textContent = `⏱ ${formatTime(remaining)}`;
        if (remaining <= 0) {
          stopDrawerTimer();
          if (currentDrawer && currentDrawer.userId === USER_ID) {
            addMessage('⏰ زمان نقاشی تمام شد.', 'system');
            resignDrawer();
          } else {
            drawerTimer.textContent = '⏱ 0:00';
          }
        } else {
          drawerTimerInterval = requestAnimationFrame(updateTimer);
        }
      };
      drawerTimerInterval = requestAnimationFrame(updateTimer);
    }

    function stopDrawerTimer() {
      if (drawerTimerInterval) {
        cancelAnimationFrame(drawerTimerInterval);
        drawerTimerInterval = null;
      }
      if (!currentDrawer) drawerTimer.textContent = '';
    }

    function publishDrawerState(drawerObj) {
      if (!mqttClient || !mqttClient.connected) return;
      mqttClient.publish(`doodle/${roomId}/drawer`, drawerObj ? JSON.stringify(drawerObj) : '', { retain: true });
    }

    function updateDrawerFromMessage(drawerObj) {
      if (!drawerObj || drawerObj.userId === USER_ID) return;
      currentDrawer = drawerObj;
      isDrawer = false;
      setDrawToolsEnabled(false);
      roleDisplay.textContent = `🖌️ ${drawerObj.name} نقاشی می‌کند`;
      wordDisplay.textContent = '';
      requestDrawBtn.disabled = (drawQueue.includes(USER_ID) || currentDrawer !== null);
      if (drawQueue.includes(USER_ID)) {
        requestDrawBtn.textContent = '⏳ در صف نقاشی';
        requestDrawBtn.classList.add('in-queue');
      } else {
        requestDrawBtn.textContent = '🎨 من می‌خواهم نقاشی کنم';
        requestDrawBtn.classList.remove('in-queue');
      }
      startDrawerTimer(drawerObj.startTime);
      updateUsersUI();
    }

    // ---------- چت و حدس ----------
    function sendChat(text) {
      if (!mqttClient) return;
      const msgData = {
        type: 'chat',
        text,
        userId: USER_ID,
        name: myName,
        timestamp: Date.now()
      };
      mqttClient.publish(`doodle/${roomId}/chat`, JSON.stringify(msgData));
      addMessage(text, 'self');
      
      // بررسی حدس درست (فقط اگر نقاش نباشم و نقاشی فعال باشد)
      if (!isDrawer && currentDrawer && text.trim().toLowerCase() === currentWord.toLowerCase()) {
        const remaining = Math.max(0, DRAW_TIME - Math.floor((Date.now() - currentDrawer.startTime) / 1000));
        // ارسال پیام صحیح به همه
        mqttClient.publish(`doodle/${roomId}/chat`, JSON.stringify({
          type: 'correct_guess',
          guesserId: USER_ID,
          guesserName: myName,
          drawerId: currentDrawer.userId,
          remainingSeconds: remaining
        }));
        // اعمال محلی (برای خودم)
        awardScores(USER_ID, currentDrawer.userId, remaining);
        if (isDrawer) resignDrawer(); // در صورتی که خودم نقاش باشم (اما شرط !isDrawer داریم، پس نخواهد بود)
        else if (currentDrawer.userId !== USER_ID) {
          // نقاش دیگری است - ما فقط امتیاز گرفتیم و نقاش توسط پیام correct_guess در کلاینت خودش resign می‌کند
        }
        addMessage(`🎉 شما کلمه را درست حدس زدید! +${remaining} امتیاز`, 'system');
      }
    }

    function onChatMessage(data) {
      if (data.type === 'chat') {
        if (data.userId !== USER_ID) {
          addMessage(data.text, 'other', data.name);
        }
        if (isHost) {
          addMessageToHistory(data.text, data.name, false, data.timestamp);
          if (chatHistory.length > MAX_HISTORY) chatHistory = chatHistory.slice(0, MAX_HISTORY);
        }
      } 
      else if (data.type === 'correct_guess') {
        // اعطای امتیاز برای همه (جز خود فرستنده، اما خود فرستنده قبلاً محلی گرفته)
        if (data.guesserId !== USER_ID || data.drawerId !== USER_ID) {
          awardScores(data.guesserId, data.drawerId, data.remainingSeconds);
        }
        // نمایش پیام در چت
        addMessage(`🎉 ${data.guesserName} کلمه را درست حدس زد! +${data.remainingSeconds} امتیاز`, 'system');
        // اگر نقاش فعلی هستم و نقاش این پیام هستم، باید نقاشی را تمام کنم
        if (currentDrawer && currentDrawer.userId === data.drawerId && currentDrawer.userId === USER_ID && isDrawer) {
          resignDrawer();
        } else if (currentDrawer && currentDrawer.userId === data.drawerId && currentDrawer.userId !== USER_ID) {
          // نقاش دیگری است - فقط وضعیت محلی را پاک می‌کنیم
          currentDrawer = null;
          roleDisplay.textContent = '🔍 حدس بزن';
          requestDrawBtn.disabled = false;
          stopDrawerTimer();
          updateUsersUI();
        }
      }
    }

    function requestChatHistory() {
      if (!isHost && mqttClient) {
        mqttClient.publish(`doodle/${roomId}/history_request`, JSON.stringify({ userId: USER_ID }));
      }
    }

    function sendChatHistory(targetUserId) {
      if (!isHost) return;
      mqttClient.publish(`doodle/${roomId}/history_response`, JSON.stringify({ targetUserId, history: chatHistory }));
    }

    // ---------- حضور و heartbeat ----------
    function startHeartbeat() {
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      heartbeatInterval = setInterval(() => {
        if (mqttClient && mqttClient.connected) {
          mqttClient.publish(`doodle/${roomId}/presence/ping/${USER_ID}`, JSON.stringify({ userId: USER_ID, timestamp: Date.now() }));
        }
      }, HEARTBEAT_INTERVAL);
    }

    function addUser(userId, userData) {
      if (userId === USER_ID) return;
      if (!roomUsers.has(userId)) {
        roomUsers.set(userId, { ...userData, lastHeartbeat: Date.now(), timer: null });
        userScores.set(userId, 0);
        addMessage(`${userData.name} وارد اتاق شد.`, 'system');
        updateUsersUI();
        checkAndSetHost();
        if (isDrawer) setTimeout(() => sendCanvasSync(), 200);
        startUserHeartbeatTimer(userId);
      } else {
        const user = roomUsers.get(userId);
        user.lastHeartbeat = Date.now();
        if (user.timer) clearTimeout(user.timer);
        startUserHeartbeatTimer(userId);
      }
    }

    function startUserHeartbeatTimer(userId) {
      const user = roomUsers.get(userId);
      if (!user) return;
      if (user.timer) clearTimeout(user.timer);
      user.timer = setTimeout(() => {
        if (roomUsers.has(userId)) {
          removeUser(userId, true);
        }
      }, HEARTBEAT_TIMEOUT);
    }

    function removeUser(userId, timeout = false) {
      const user = roomUsers.get(userId);
      if (!user) return;
      if (user.timer) clearTimeout(user.timer);
      roomUsers.delete(userId);
      userScores.delete(userId);
      if (timeout) addMessage(`${user.name} به دلیل عدم فعالیت خارج شد.`, 'system');
      else addMessage(`${user.name} از اتاق خارج شد.`, 'system');
      updateUsersUI();
      if (userId === hostId) checkAndSetHost();
      if (userId === currentDrawer?.userId && !isDrawer) {
        currentDrawer = null;
        roleDisplay.textContent = '🔍 حدس بزن';
        requestDrawBtn.disabled = false;
        stopDrawerTimer();
        if (isHost) assignNextDrawerFromQueue();
      }
      if (isHost) {
        const idx = drawQueue.indexOf(userId);
        if (idx !== -1) drawQueue.splice(idx, 1);
        broadcastQueue();
      }
    }

    // ---------- نوبت‌دهی و میزبان ----------
    function determineHost() {
      if (roomUsers.size === 0) return USER_ID;
      let oldest = { userId: USER_ID, joinTime };
      for (let [uid, info] of roomUsers.entries()) {
        if (info.joinTime < oldest.joinTime) oldest = { userId: uid, joinTime: info.joinTime };
      }
      return oldest.userId;
    }

    function checkAndSetHost() {
      const newHostId = determineHost();
      if (newHostId === USER_ID && !isHost) {
        isHost = true;
        hostId = USER_ID;
        addMessage('👑 شما میزبان اتاق شدید.', 'system');
        mqttClient.publish(`doodle/${roomId}/host`, JSON.stringify({ hostId: USER_ID }), { retain: true });
        broadcastQueue();
        if (!currentDrawer && drawQueue.length > 0) assignNextDrawerFromQueue();
      } else if (newHostId !== USER_ID && isHost) {
        isHost = false;
        hostId = newHostId;
        addMessage(`میزبان جدید: ${roomUsers.get(newHostId)?.name || 'کاربر'}`, 'system');
      }
      updateUsersUI();
    }

    function broadcastQueue() {
      if (!isHost || !mqttClient) return;
      mqttClient.publish(`doodle/${roomId}/queue`, JSON.stringify({ queue: drawQueue, hostId: USER_ID }), { retain: true });
      updateQueueUI();
    }

    function handleQueueMessage(data) {
      if (data.hostId === USER_ID) return;
      drawQueue = data.queue || [];
      updateQueueUI();
    }

    function requestToDraw() {
      if (isDrawer) return;
      if (currentDrawer) {
        addMessage('درخواست شما به صف اضافه شد.', 'system');
      }
      mqttClient.publish(`doodle/${roomId}/draw_request`, JSON.stringify({ userId: USER_ID, name: myName }));
    }

    function addToQueue(requestorId) {
      if (!isHost) return;
      if (!drawQueue.includes(requestorId) && requestorId !== currentDrawer?.userId) {
        drawQueue.push(requestorId);
        broadcastQueue();
        if (!currentDrawer) assignNextDrawerFromQueue();
      }
    }

    function assignNextDrawerFromQueue() {
      if (!isHost) return;
      if (currentDrawer) return;
      if (drawQueue.length === 0) return;
      const nextId = drawQueue.shift();
      broadcastQueue();
      mqttClient.publish(`doodle/${roomId}/assign_drawer`, JSON.stringify({ userId: nextId }));
    }

    function onAssignDrawer(data) {
      if (data.userId === USER_ID && !isDrawer && !currentDrawer) {
        becomeDrawer();
      }
    }

    function updateQueueUI() {
      if (drawQueue.includes(USER_ID)) {
        requestDrawBtn.disabled = true;
        requestDrawBtn.textContent = '⏳ در صف نقاشی';
        requestDrawBtn.classList.add('in-queue');
      } else if (!currentDrawer || currentDrawer.userId !== USER_ID) {
        requestDrawBtn.disabled = (currentDrawer !== null);
        requestDrawBtn.textContent = '🎨 من می‌خواهم نقاشی کنم';
        requestDrawBtn.classList.remove('in-queue');
      }
      let queueInfo = document.querySelector('.queue-info');
      if (!queueInfo) {
        queueInfo = document.createElement('span');
        queueInfo.className = 'queue-info';
        requestDrawBtn.parentNode.appendChild(queueInfo);
      }
      queueInfo.textContent = drawQueue.length ? `صف: ${drawQueue.length} نفر` : '';
    }

    // ---------- MQTT پیام‌ها ----------
    function onMqttMessage(topic, message) {
      const payload = message.toString();
      if (!payload) return;

      if (topic === `doodle/${roomId}/chat`) {
        try {
          const data = JSON.parse(payload);
          onChatMessage(data);
        } catch(e) {}
      }
      else if (topic === `doodle/${roomId}/history_request`) {
        try {
          const data = JSON.parse(payload);
          if (isHost && data.userId !== USER_ID) sendChatHistory(data.userId);
        } catch(e) {}
      }
      else if (topic === `doodle/${roomId}/history_response`) {
        try {
          const data = JSON.parse(payload);
          if (data.targetUserId === USER_ID && data.history) {
            chatHistory = data.history.slice(0, MAX_HISTORY);
            loadHistoryToUI();
          }
        } catch(e) {}
      }
      else if (topic === `doodle/${roomId}/draw`) {
        try {
          const data = JSON.parse(payload);
          if (data.type === 'draw') handleRemoteDraw(data);
          else if (data.type === 'clear') {
            if (data.userId !== USER_ID) clearCanvas(false);
          }
          else if (data.type === 'canvas_sync') {
            if (!isDrawer && data.image) {
              const img = new Image();
              img.onload = () => {
                if (canvas.width > 0 && canvas.height > 0) {
                  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                }
              };
              img.src = data.image;
            }
          }
        } catch(e) {}
      }
      else if (topic.startsWith(`doodle/${roomId}/presence/ping/`)) {
        const userId = topic.split('/').pop();
        if (userId === USER_ID) return;
        if (roomUsers.has(userId)) {
          const user = roomUsers.get(userId);
          user.lastHeartbeat = Date.now();
          if (user.timer) clearTimeout(user.timer);
          startUserHeartbeatTimer(userId);
        }
      }
      else if (topic === `doodle/${roomId}/presence/init`) {
        try {
          const data = JSON.parse(payload);
          if (data.userId !== USER_ID) {
            addUser(data.userId, { name: data.name, joinTime: data.joinTime });
          }
        } catch(e) {}
      }
      else if (topic === `doodle/${roomId}/drawer`) {
        if (payload) {
          try {
            const drawer = JSON.parse(payload);
            if (drawer.userId !== USER_ID) updateDrawerFromMessage(drawer);
          } catch(e) {}
        } else {
          if (!isDrawer) {
            currentDrawer = null;
            roleDisplay.textContent = '🔍 حدس بزن';
            requestDrawBtn.disabled = false;
            stopDrawerTimer();
            updateUsersUI();
            if (isHost) assignNextDrawerFromQueue();
          }
        }
      }
      else if (topic === `doodle/${roomId}/draw_request`) {
        try {
          const data = JSON.parse(payload);
          if (isHost && data.userId !== USER_ID) addToQueue(data.userId);
        } catch(e) {}
      }
      else if (topic === `doodle/${roomId}/drawer_finished`) {
        if (isHost) assignNextDrawerFromQueue();
      }
      else if (topic === `doodle/${roomId}/assign_drawer`) {
        try {
          const data = JSON.parse(payload);
          if (!isHost) onAssignDrawer(data);
        } catch(e) {}
      }
      else if (topic === `doodle/${roomId}/queue`) {
        try {
          const data = JSON.parse(payload);
          if (!isHost) handleQueueMessage(data);
        } catch(e) {}
      }
      else if (topic === `doodle/${roomId}/host`) {
        try {
          const data = JSON.parse(payload);
          if (data.hostId !== USER_ID && data.hostId !== hostId) {
            hostId = data.hostId;
            updateUsersUI();
          }
        } catch(e) {}
      }
    }

    function publishMyPresence() {
      if (!mqttClient || !mqttClient.connected) return;
      mqttClient.publish(`doodle/${roomId}/presence/init`, JSON.stringify({ userId: USER_ID, name: myName, joinTime }));
      mqttClient.publish(`doodle/${roomId}/presence/list/${USER_ID}`, JSON.stringify({ name: myName, joinTime }), { retain: true });
    }

    function initMqtt() {
      mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
      mqttClient.on('connect', () => {
        statusLabel.innerText = '✅ متصل';
        mqttClient.subscribe(`doodle/${roomId}/chat`);
        mqttClient.subscribe(`doodle/${roomId}/draw`);
        mqttClient.subscribe(`doodle/${roomId}/presence/ping/+`);
        mqttClient.subscribe(`doodle/${roomId}/presence/init`);
        mqttClient.subscribe(`doodle/${roomId}/drawer`);
        mqttClient.subscribe(`doodle/${roomId}/draw_request`);
        mqttClient.subscribe(`doodle/${roomId}/drawer_finished`);
        mqttClient.subscribe(`doodle/${roomId}/assign_drawer`);
        mqttClient.subscribe(`doodle/${roomId}/queue`);
        mqttClient.subscribe(`doodle/${roomId}/host`);
        mqttClient.subscribe(`doodle/${roomId}/history_request`);
        mqttClient.subscribe(`doodle/${roomId}/history_response`);
        mqttClient.on('message', onMqttMessage);
        publishMyPresence();
        startHeartbeat();
        setTimeout(() => requestChatHistory(), 500);
        setTimeout(() => checkAndSetHost(), 1000);
      });
      mqttClient.on('close', () => {
        statusLabel.innerText = '⚠️ قطع';
        if (heartbeatInterval) clearInterval(heartbeatInterval);
      });
      window.addEventListener('beforeunload', () => {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        if (mqttClient && mqttClient.connected) {
          mqttClient.publish(`doodle/${roomId}/presence/list/${USER_ID}`, '', { retain: true });
          mqttClient.end();
        }
      });
    }

    // ---------- راه‌اندازی اولیه ----------
    requestDrawBtn.addEventListener('click', () => {
      if (isDrawer) return;
      if (currentDrawer || drawQueue.includes(USER_ID)) {
        if (!drawQueue.includes(USER_ID)) requestToDraw();
        return;
      }
      requestToDraw();
    });

    startBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return alert('نام خود را وارد کنید');
      myName = name;
      roomId = roomInput.value.trim() || 'doodle_room';
      joinTime = Date.now();
      loginBox.style.display = 'none';
      app.style.display = 'flex';
      resizeCanvas();
      userScores.set(USER_ID, 0);
      initMqtt();
      updateUsersUI();
    });

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDrawing);
    canvas.addEventListener('mouseleave', endDrawing);
    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDrawing);

    setDrawToolsEnabled(false);
    roleDisplay.textContent = 'منتظر اتصال...';
  })();
</script>
</body>
