<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>نقاشی و حدس گروهی</title>
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: #1e1e2f; color: #fff;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      height: 100dvh; display: flex; flex-direction: column;
      overflow: hidden; touch-action: manipulation;
    }
    .login {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: #1e1e2f; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; gap: 15px;
    }
    .login h2 { color: #ffb86c; }
    .login input {
      padding: 12px 20px; border-radius: 30px; border: none;
      background: #3a3a5a; color: #fff; width: 220px; text-align: center; font-size: 16px;
    }
    .login button {
      padding: 12px 30px; border-radius: 30px; border: none;
      background: #7c5cfc; color: #fff; font-weight: bold; cursor: pointer; font-size: 16px;
    }
    #app { display: none; flex-direction: column; height: 100%; padding: 8px; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #2d2d44; padding: 10px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; flex-wrap: wrap;
    }
    .status { color: #ffb86c; }
    .game-info {
      font-size: 14px; text-align: center; margin: 4px 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    canvas {
      background: #fff; border-radius: 12px; touch-action: none;
      width: 100%; flex: 1; display: block; margin-bottom: 8px; min-height: 0;
    }
    .tools {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;
    }
    .tools input[type="color"] { width: 40px; height: 40px; border: none; background: none; }
    .tools input[type="range"] { flex: 1; }
    button {
      background: #7c5cfc; color: #fff; border: none; border-radius: 8px; padding: 8px 12px;
      font-weight: bold; cursor: pointer; white-space: nowrap;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .chat-area {
      background: #2d2d44; border-radius: 12px; padding: 8px; display: flex; flex-direction: column;
      max-height: 25vh; min-height: 120px;
    }
    .messages { flex: 1; overflow-y: auto; margin-bottom: 8px; font-size: 14px; }
    .message {
      margin-bottom: 4px; padding: 4px 8px; background: #3a3a5a; border-radius: 8px; word-break: break-word;
    }
    .message.self { background: #5a4a8a; text-align: left; }
    .chat-input { display: flex; gap: 6px; }
    .chat-input input {
      flex: 1; padding: 10px; border-radius: 8px; border: none; background: #3a3a5a; color: #fff;
    }
    .user-chip {
      background: #2a3942; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin: 2px;
      white-space: nowrap;
    }
    .drawer-chip { background: #7c5cfc; }
    #requestDrawBtn { margin: 0 8px; }
    .timer { color: #ffb86c; font-weight: bold; }
  </style>
</head>
<body>

<div id="loginBox" class="login">
  <h2>🎨 نقاشی و حدس گروهی</h2>
  <input type="text" id="roomInput" placeholder="شناسه اتاق (پیش‌فرض doodle_room)" autocomplete="off">
  <input type="text" id="nameInput" placeholder="نام شما" autocomplete="off">
  <button id="startBtn">ورود به اتاق</button>
</div>

<div id="app">
  <div class="top-bar">
    <span class="status" id="statusLabel">در حال اتصال...</span>
    <div style="display:flex; align-items:center; gap:8px; flex-wrap: wrap;">
      <button id="requestDrawBtn">🎨 من می‌خواهم نقاشی کنم</button>
      <span id="drawerTimer" class="timer"></span>
    </div>
    <div id="usersContainer" style="display:flex; gap:6px; flex-wrap: wrap;"></div>
  </div>
  <div class="game-info">
    <span id="roleDisplay"></span>
    <span id="wordDisplay" style="font-weight:bold; color:#ffb86c;"></span>
    <span id="scoreDisplay">🏆 0</span>
  </div>
  <canvas id="drawCanvas"></canvas>
  <div class="tools" id="toolbar">
    <input type="color" id="colorPicker" value="#000000">
    <input type="range" id="brushSize" min="2" max="20" value="4">
    <button id="clearBtn">پاک کردن</button>
  </div>
  <div class="chat-area">
    <div class="messages" id="messageContainer"></div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="حدس بزن یا چت کن..." autocomplete="off">
      <button id="sendBtn">ارسال</button>
    </div>
  </div>
</div>

<script>
  (function(){
    const WORDS = ['سیب', 'موز', 'ماشین', 'گربه', 'خانه', 'درخت', 'آفتاب', 'ماهی', 'گل', 'کتاب', 'قلب', 'ستاره', 'پیتزا', 'هواپیما', 'ساعت', 'فیل', 'موبایل', 'عینک', 'مداد', 'کفش'];

    const loginBox = document.getElementById('loginBox');
    const roomInput = document.getElementById('roomInput');
    const nameInput = document.getElementById('nameInput');
    const startBtn = document.getElementById('startBtn');
    const app = document.getElementById('app');
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const brushSize = document.getElementById('brushSize');
    const clearBtn = document.getElementById('clearBtn');
    const toolbar = document.getElementById('toolbar');
    const messageContainer = document.getElementById('messageContainer');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusLabel = document.getElementById('statusLabel');
    const roleDisplay = document.getElementById('roleDisplay');
    const wordDisplay = document.getElementById('wordDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const usersContainer = document.getElementById('usersContainer');
    const requestDrawBtn = document.getElementById('requestDrawBtn');
    const drawerTimer = document.getElementById('drawerTimer');

    let myName = '', roomId = 'doodle_room';
    let myPeerId = null;
    let peer = null;
    let mqttClient = null;
    const peers = new Map();

    let currentDrawer = null;
    let isDrawer = false;
    let drawerTimerInterval = null;
    const DRAW_TIME = 120; // ۲ دقیقه

    let currentWord = '';
    let myScore = 0;
    let drawing = false;
    let lastX, lastY;

    // ---------- اصلاح ابعاد بوم ----------
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return; // از تنظیم صفر جلوگیری کن
      canvas.width = rect.width;
      canvas.height = rect.height;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }
    // فراخوانی اولیه ممکن است صفر باشد، اشکالی ندارد
    resizeCanvas();
    // بعد از هر تغییر اندازه پنجره
    window.addEventListener('resize', resizeCanvas);
    // همچنین وقتی صفحه کاملاً نمایش داده شد دوباره تنظیم کن
    // (این کار در رویداد ورود انجام خواهد شد)

    function setDrawToolsEnabled(enabled) {
      toolbar.style.display = enabled ? 'flex' : 'none';
    }

    function startDrawing(e) {
      if (!isDrawer) return;
      e.preventDefault();
      drawing = true;
      const pos = getCanvasCoords(e);
      lastX = pos.x; lastY = pos.y;
      ctx.beginPath(); ctx.moveTo(lastX, lastY);
      broadcastDrawing('start', lastX, lastY);
    }

    function draw(e) {
      if (!drawing || !isDrawer) return;
      e.preventDefault();
      const pos = getCanvasCoords(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = colorPicker.value;
      ctx.lineWidth = brushSize.value;
      ctx.stroke();
      broadcastDrawing('move', pos.x, pos.y);
      lastX = pos.x; lastY = pos.y;
    }

    function endDrawing(e) {
      if (!isDrawer) return;
      drawing = false;
      ctx.closePath();
      broadcastDrawing('end');
    }

    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function broadcastDrawing(type, x, y) {
      peers.forEach((conn) => {
        if (conn.open) {
          conn.send({ type: 'draw', drawType: type, x, y, color: colorPicker.value, size: brushSize.value });
        }
      });
    }

    function handleRemoteDraw(data) {
      if (isDrawer) return;
      ctx.strokeStyle = data.color;
      ctx.lineWidth = data.size;
      if (data.drawType === 'start') {
        ctx.beginPath(); ctx.moveTo(data.x, data.y);
      } else if (data.drawType === 'move') {
        ctx.lineTo(data.x, data.y); ctx.stroke();
      } else if (data.drawType === 'end') {
        ctx.closePath();
      }
    }

    function clearCanvas(send = true) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (send && isDrawer) {
        peers.forEach(c => c.send({ type: 'clear' }));
      }
    }
    clearBtn.addEventListener('click', () => clearCanvas());

    function pickNewWord() {
      currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
      wordDisplay.textContent = isDrawer ? `🎨 کلمه تو: ${currentWord}` : '';
    }

    function becomeDrawer() {
      isDrawer = true;
      currentDrawer = { peerId: myPeerId, name: myName, startTime: Date.now() };
      pickNewWord();
      setDrawToolsEnabled(true);
      roleDisplay.textContent = '🖌️ تو نقاشی';
      requestDrawBtn.disabled = true;
      requestDrawBtn.textContent = '🎨 در حال نقاشی...';
      startDrawerTimer();
      publishDrawerState(currentDrawer);
      peers.forEach(c => c.send({ type: 'drawer_active', drawer: currentDrawer }));
    }

    function resignDrawer() {
      if (!isDrawer) return;
      isDrawer = false;
      currentDrawer = null;
      clearCanvas(true);
      setDrawToolsEnabled(false);
      roleDisplay.textContent = '🔍 حدس بزن';
      wordDisplay.textContent = '';
      stopDrawerTimer();
      requestDrawBtn.disabled = false;
      requestDrawBtn.textContent = '🎨 من می‌خواهم نقاشی کنم';
      publishDrawerState(null);
      peers.forEach(c => c.send({ type: 'drawer_inactive' }));
    }

    function startDrawerTimer() {
      let remaining = DRAW_TIME;
      drawerTimer.textContent = `⏱ ${formatTime(remaining)}`;
      drawerTimerInterval = setInterval(() => {
        remaining--;
        drawerTimer.textContent = `⏱ ${formatTime(remaining)}`;
        if (remaining <= 0) {
          clearInterval(drawerTimerInterval);
          addMessage('⏰ زمان نقاشی تمام شد.', 'system');
          resignDrawer();
        }
      }, 1000);
    }

    function stopDrawerTimer() {
      if (drawerTimerInterval) {
        clearInterval(drawerTimerInterval);
        drawerTimerInterval = null;
      }
      drawerTimer.textContent = '';
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function updateMyScoreDisplay() {
      scoreDisplay.textContent = `🏆 ${myScore}`;
    }

    function handleCorrectGuess(guesserPeerId) {
      if (guesserPeerId === myPeerId) {
        myScore++;
        updateMyScoreDisplay();
        addMessage('✅ حدس درست! یک امتیاز گرفتی.', 'system');
      }
      if (currentDrawer && currentDrawer.peerId === myPeerId) {
        myScore++;
        updateMyScoreDisplay();
        addMessage('🎯 یک نفر درست حدس زد، تو هم امتیاز گرفتی.', 'system');
      }
      broadcastScore();
    }

    function broadcastScore() {
      peers.forEach(c => c.send({ type: 'score_update', peerId: myPeerId, score: myScore }));
    }

    function handleRemoteScore(data) {
      if (data.peerId !== myPeerId) {
        addMessage(`🏆 ${data.peerId.substring(0,6)} امتیاز: ${data.score}`, 'other');
      }
    }

    function addMessage(text, sender = 'other') {
      const div = document.createElement('div');
      div.className = `message ${sender === 'self' ? 'self' : ''}`;
      div.textContent = text;
      messageContainer.appendChild(div);
      messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    function sendChat(text) {
      peers.forEach(c => c.send({ type: 'chat', text, from: myPeerId }));
      addMessage(text, 'self');
      if (!isDrawer && currentDrawer && text.trim().toLowerCase() === currentWord.toLowerCase()) {
        handleCorrectGuess(myPeerId);
        const drawerConn = peers.get(currentDrawer.peerId);
        if (drawerConn) drawerConn.send({ type: 'correct_guess', guesser: myPeerId });
      }
    }

    sendBtn.addEventListener('click', () => {
      const text = chatInput.value.trim();
      if (text) { sendChat(text); chatInput.value = ''; }
    });
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

    // شبکه همتا
    function connectToPeer(peerId) {
      if (peerId === myPeerId || peers.has(peerId)) return;
      const conn = peer.connect(peerId, { reliable: true });
      peers.set(peerId, conn);
      setupConnection(conn, false);
    }

    function setupConnection(conn, isIncoming) {
      conn.on('open', () => {
        conn.send({ type: 'HELLO', name: myName, peerId: myPeerId });
        if (isDrawer) {
          conn.send({ type: 'drawer_active', drawer: { peerId: myPeerId, name: myName, startTime: Date.now() } });
        }
      });

      conn.on('data', (data) => {
        switch (data.type) {
          case 'HELLO':
            conn.metadata = conn.metadata || {};
            conn.metadata.name = data.name;
            updateUsersUI();
            break;
          case 'draw':
            handleRemoteDraw(data);
            break;
          case 'clear':
            clearCanvas(false);
            break;
          case 'chat':
            if (data.from !== myPeerId) {
              addMessage(data.text, 'other');
              if (!isDrawer && currentDrawer && data.text.trim().toLowerCase() === currentWord.toLowerCase()) {
                handleCorrectGuess(myPeerId);
                conn.send({ type: 'correct_guess', guesser: myPeerId });
              }
            }
            break;
          case 'correct_guess':
            if (isDrawer && data.guesser !== myPeerId) handleCorrectGuess(data.guesser);
            break;
          case 'drawer_active':
            updateDrawer(data.drawer);
            break;
          case 'drawer_inactive':
            if (!isDrawer) {
              currentDrawer = null;
              roleDisplay.textContent = '🔍 حدس بزن';
              wordDisplay.textContent = '';
              requestDrawBtn.disabled = false;
              requestDrawBtn.textContent = '🎨 من می‌خواهم نقاشی کنم';
              stopDrawerTimer();
            }
            break;
          case 'score_update':
            handleRemoteScore(data);
            break;
        }
      });

      conn.on('close', () => {
        peers.delete(conn.peer);
        updateUsersUI();
        if (currentDrawer && currentDrawer.peerId === conn.peer) {
          currentDrawer = null;
          if (!isDrawer) {
            roleDisplay.textContent = '🔍 حدس بزن';
            requestDrawBtn.disabled = false;
            requestDrawBtn.textContent = '🎨 من می‌خواهم نقاشی کنم';
          }
          stopDrawerTimer();
          mqttClient.publish(`doodle/${roomId}/drawer`, '', { retain: true });
        }
      });
    }

    // MQTT
    function publishDrawerState(drawerObj) {
      if (!mqttClient || !mqttClient.connected) return;
      const topic = `doodle/${roomId}/drawer`;
      mqttClient.publish(topic, drawerObj ? JSON.stringify(drawerObj) : '', { retain: true });
    }

    function updateDrawer(drawerObj) {
      if (!drawerObj || drawerObj.peerId === myPeerId) return;
      currentDrawer = drawerObj;
      isDrawer = false;
      setDrawToolsEnabled(false);
      roleDisplay.textContent = `🖌️ ${drawerObj.name} نقاشی می‌کند`;
      wordDisplay.textContent = '';
      requestDrawBtn.disabled = true;
      requestDrawBtn.textContent = '🎨 نقاش فعال است';
      stopDrawerTimer();
      const elapsed = Math.floor((Date.now() - drawerObj.startTime) / 1000);
      const remaining = Math.max(DRAW_TIME - elapsed, 0);
      if (remaining > 0) {
        drawerTimer.textContent = `⏱ ${formatTime(remaining)}`;
        drawerTimerInterval = setInterval(() => {
          const newRemaining = Math.max(Math.floor((DRAW_TIME * 1000 - (Date.now() - drawerObj.startTime)) / 1000), 0);
          drawerTimer.textContent = `⏱ ${formatTime(newRemaining)}`;
          if (newRemaining <= 0) clearInterval(drawerTimerInterval);
        }, 1000);
      }
    }

    function onMqttMessage(topic, message) {
      const payload = message.toString();
      if (topic === `doodle/${roomId}/drawer`) {
        if (payload) {
          try {
            const drawer = JSON.parse(payload);
            if (drawer.peerId !== myPeerId) updateDrawer(drawer);
          } catch (e) {}
        } else {
          if (!isDrawer) {
            currentDrawer = null;
            roleDisplay.textContent = '🔍 حدس بزن';
            requestDrawBtn.disabled = false;
            requestDrawBtn.textContent = '🎨 من می‌خواهم نقاشی کنم';
            stopDrawerTimer();
          }
        }
      } else if (topic === `doodle/${roomId}/presence`) {
        if (payload) {
          try {
            const user = JSON.parse(payload);
            if (user.peerId !== myPeerId && !peers.has(user.peerId)) {
              connectToPeer(user.peerId);
              announcePresence();
            }
          } catch (e) {}
        }
      }
    }

    function announcePresence() {
      if (!mqttClient || !mqttClient.connected) return;
      mqttClient.publish(`doodle/${roomId}/presence`, JSON.stringify({ peerId: myPeerId, name: myName }));
    }

    function initMqtt() {
      mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
      mqttClient.on('connect', () => {
        statusLabel.innerText = '✅ متصل به اتاق';
        mqttClient.subscribe(`doodle/${roomId}/drawer`);
        mqttClient.subscribe(`doodle/${roomId}/presence`);
        mqttClient.on('message', onMqttMessage);
        announcePresence();
        requestDrawBtn.disabled = false;
      });
      mqttClient.on('close', () => statusLabel.innerText = '⚠️ قطع MQTT');
    }

    function updateUsersUI() {
      usersContainer.innerHTML = `<span class="user-chip">👤 ${myName} (من)</span>`;
      peers.forEach((conn, pid) => {
        const name = conn.metadata?.name || pid.substring(0,6);
        usersContainer.innerHTML += `<span class="user-chip">👤 ${name}</span>`;
      });
      if (currentDrawer) {
        const chips = usersContainer.querySelectorAll('.user-chip');
        chips.forEach(chip => {
          if (chip.textContent.includes(currentDrawer.name) || chip.textContent.includes(currentDrawer.peerId.substring(0,6))) {
            chip.classList.add('drawer-chip');
          }
        });
      }
    }

    requestDrawBtn.addEventListener('click', () => {
      if (isDrawer || currentDrawer) return;
      becomeDrawer();
    });

    startBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return alert('نام خود را وارد کنید');
      myName = name;
      roomId = roomInput.value.trim() || 'doodle_room';
      loginBox.style.display = 'none';
      app.style.display = 'flex';
      // ⚠️ رفع بحرانی: حالا که app نمایش داده شد، ابعاد بوم را دوباره تنظیم کن
      resizeCanvas();
      initPeerAndStart();
    });

    function initPeerAndStart() {
      const iceServers = [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
      ];
      peer = new Peer(null, { debug: 0, config: { iceServers } });

      peer.on('open', (id) => {
        myPeerId = id;
        statusLabel.innerText = `🆔 ${id.substring(0,6)}`;
        initMqtt();
        updateUsersUI();
      });

      peer.on('connection', (conn) => {
        if (peers.has(conn.peer)) return;
        conn.metadata = { name: '' };
        peers.set(conn.peer, conn);
        setupConnection(conn, true);
        updateUsersUI();
      });

      peer.on('disconnected', () => statusLabel.innerText = '⚠️ قطع Peer');
      peer.on('error', (err) => statusLabel.innerText = `⚠️ خطا: ${err.message}`);
    }

    // رویدادهای نقاشی
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDrawing);
    canvas.addEventListener('mouseleave', endDrawing);
    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDrawing);

    setDrawToolsEnabled(false);
    roleDisplay.textContent = 'منتظر اتصال...';
  })();
</script>
</body>
</html>
