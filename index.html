<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>نقاشی گروهی پیشرفته | MQTT</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background:#1e1e2f; color:#fff; font-family:'Segoe UI',Tahoma,sans-serif;
      height:100dvh; display:flex; flex-direction:column; overflow:hidden; touch-action:manipulation;
    }
    .login {
      position:fixed; top:0; left:0; right:0; bottom:0; background:#1e1e2f; display:flex;
      flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:15px;
      padding:20px;
    }
    .login h2 { color:#ffb86c; font-size:1.5rem; text-align:center; }
    .login input {
      padding:12px 20px; border-radius:30px; border:none; background:#3a3a5a; color:#fff;
      width:80%; max-width:280px; text-align:center; font-size:16px;
    }
    .login button {
      padding:12px 30px; border-radius:30px; border:none; background:#7c5cfc;
      color:#fff; font-weight:bold; cursor:pointer; font-size:16px;
    }
    #app { display:none; flex-direction:column; height:100%; padding:8px; }
    .top-bar {
      display:flex; align-items:center; justify-content:space-between; background:#2d2d44;
      padding:8px 12px; border-radius:12px; margin-bottom:8px; font-size:12px;
      flex-wrap:wrap; gap:6px;
    }
    .status { color:#ffb86c; font-size:12px; }
    .timer { color:#ffb86c; font-weight:bold; font-size:12px; }
    .game-info {
      font-size:13px; text-align:center; margin:4px 0; display:flex; justify-content:space-between; align-items:center;
      flex-wrap:wrap; gap:6px;
    }
    canvas {
      background:#fff; border-radius:12px; touch-action:none; width:100%; flex:1; display:block; margin-bottom:8px;
      min-height:200px;
    }
    .tools {
      display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;
      justify-content:center;
    }
    .tools input[type="color"] { width:44px; height:44px; border:none; background:none; cursor:pointer; }
    .tools input[type="range"] { flex:1; min-width:100px; height:44px; }
    button {
      background:#7c5cfc; color:#fff; border:none; border-radius:8px; padding:8px 16px;
      font-weight:bold; cursor:pointer; white-space:nowrap; font-size:14px;
      min-height:44px; min-width:44px;
    }
    button:disabled { opacity:0.5; cursor:default; }
    .chat-area {
      background:#2d2d44; border-radius:12px; padding:8px; display:flex; flex-direction:column;
      max-height:28vh; min-height:120px;
    }
    .messages { flex:1; overflow-y:auto; margin-bottom:6px; font-size:13px; }
    .message {
      margin-bottom:4px; padding:6px 10px; background:#3a3a5a; border-radius:8px; word-break:break-word;
    }
    .message.self { background:#5a4a8a; text-align:left; }
    .message.system { background:#2d4a5a; text-align:center; font-style:italic; }
    .chat-input { display:flex; gap:6px; }
    .chat-input input {
      flex:1; padding:12px; border-radius:8px; border:none; background:#3a3a5a; color:#fff;
      font-size:14px; min-height:44px;
    }
    .users-container {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      overflow-x: auto;
      padding:4px 0;
    }
    .user-chip {
      background:#2a3942; padding:4px 12px; border-radius:20px; font-size:11px; white-space:nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .user-chip .score {
      font-weight: bold;
      background: #1e1e2f;
      border-radius: 12px;
      padding: 0 6px;
      margin-right: 4px;
    }
    .drawer-chip { background:#7c5cfc; }

    @media (max-width: 600px) {
      .top-bar { flex-direction: column; align-items: stretch; }
      .tools { gap: 6px; }
      button { padding: 6px 12px; font-size: 12px; }
      .user-chip { font-size: 10px; padding: 3px 8px; }
      .game-info { font-size: 11px; }
      .message { font-size: 12px; padding: 4px 8px; }
    }
  </style>
</head>
<body>

<div id="loginBox" class="login">
  <h2>🎨 نقاشی گروهی پیشرفته</h2>
  <input type="text" id="roomInput" placeholder="شناسه اتاق (پیش‌فرض doodle_room)" autocomplete="off">
  <input type="text" id="nameInput" placeholder="نام شما" autocomplete="off">
  <button id="startBtn">ورود به اتاق</button>
</div>

<div id="app">
  <div class="top-bar">
    <span class="status" id="statusLabel">در حال اتصال...</span>
    <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
      <button id="requestDrawBtn">🎨 من می‌خواهم نقاشی کنم</button>
      <span id="drawerTimer" class="timer"></span>
    </div>
    <div id="usersContainer" class="users-container"></div>
  </div>
  <div class="game-info">
    <span id="roleDisplay"></span>
    <span id="wordDisplay" style="font-weight:bold; color:#ffb86c;"></span>
    <span id="scoreDisplay">🏆 0</span>
  </div>
  <canvas id="drawCanvas"></canvas>
  <div class="tools" id="toolbar">
    <input type="color" id="colorPicker" value="#000000">
    <input type="range" id="brushSize" min="2" max="20" value="4">
    <button id="undoBtn" title="برگردان">↩️</button>
    <button id="fillBtn" title="سطل رنگ">🪣</button>
    <button id="clearBtn">پاک کردن</button>
  </div>
  <div class="chat-area">
    <div class="messages" id="messageContainer"></div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="حدس بزن یا چت کن..." autocomplete="off">
      <button id="sendBtn">ارسال</button>
    </div>
  </div>
</div>

<script>
(function(){
  // 100 کلمه
  const WORDS = [
    'سیب', 'موز', 'پرتقال', 'انگور', 'هندوانه', 'گلابی', 'هلو', 'گیلاس', 'توت فرنگی', 'آناناس',
    'ماشین', 'اتوبوس', 'قطار', 'هواپیما', 'دوچرخه', 'موتورسیکلت', 'کشتی', 'بالگرد', 'تراکتور', 'آمبولانس',
    'گربه', 'سگ', 'گاو', 'اسب', 'خرگوش', 'موش', 'پرنده', 'ماهی', 'شیر', 'فیل',
    'خانه', 'درخت', 'گل', 'کوه', 'رودخانه', 'دریاچه', 'ابر', 'باران', 'آفتاب', 'ستاره',
    'قلب', 'مربع', 'دایره', 'مثلث', 'پروانه', 'مداد', 'کتاب', 'مدرسه', 'قلم', 'خط کش',
    'پاک کن', 'کیف', 'صندلی', 'میز', 'تخته سیاه', 'پیتزا', 'برگر', 'بستنی', 'کیک', 'نان',
    'پنیر', 'شیر', 'آب میوه', 'قهوه', 'چای', 'عینک', 'کلاه', 'کفش', 'تی شرت', 'شلوار',
    'دامن', 'کاپشن', 'چتر', 'ساعت', 'زنگ', 'توپ', 'عروسک', 'ماشین اسباب بازی', 'قطار اسباب بازی', 'پازل',
    'لگو', 'بادکنک', 'بازی ویدئویی', 'کتاب داستان', 'نقاشی', 'تلفن', 'کامپیوتر', 'تلویزیون', 'هدفون', 'دوربین',
    'چراغ', 'باتری', 'صفحه کلید', 'موشواره', 'مانیتور', 'آب', 'آتش', 'باد', 'خاک', 'برف'
  ];

  const DRAW_TIME = 120;
  const HEARTBEAT_INTERVAL = 3000;
  const HEARTBEAT_TIMEOUT = 12000;
  const THROTTLE_MS = 20;
  const MAX_HISTORY = 20;
  const UNDO_STACK_SIZE = 10;

  // DOM elements
  const dom = {
    loginBox: document.getElementById('loginBox'),
    roomInput: document.getElementById('roomInput'),
    nameInput: document.getElementById('nameInput'),
    startBtn: document.getElementById('startBtn'),
    app: document.getElementById('app'),
    canvas: document.getElementById('drawCanvas'),
    colorPicker: document.getElementById('colorPicker'),
    brushSize: document.getElementById('brushSize'),
    undoBtn: document.getElementById('undoBtn'),
    fillBtn: document.getElementById('fillBtn'),
    clearBtn: document.getElementById('clearBtn'),
    toolbar: document.getElementById('toolbar'),
    messageContainer: document.getElementById('messageContainer'),
    chatInput: document.getElementById('chatInput'),
    sendBtn: document.getElementById('sendBtn'),
    statusLabel: document.getElementById('statusLabel'),
    roleDisplay: document.getElementById('roleDisplay'),
    wordDisplay: document.getElementById('wordDisplay'),
    scoreDisplay: document.getElementById('scoreDisplay'),
    usersContainer: document.getElementById('usersContainer'),
    requestDrawBtn: document.getElementById('requestDrawBtn'),
    drawerTimer: document.getElementById('drawerTimer')
  };
  const ctx = dom.canvas.getContext('2d');

  // ========== متغیرها ==========
  const USER_ID = 'u' + Math.random().toString(36).substring(2, 11);
  let myName = '', roomId = 'doodle_room';
  let mqttClient = null;
  let joinTime = Date.now();

  let users = new Map();          // userId -> { name, score, joinTime, lastPing, timer }
  let currentDrawer = null;      // { userId, name, startTime, word }
  let isDrawer = false;
  let chatHistory = [];

  let drawing = false;
  let lastX, lastY;
  let pendingDraw = null;
  let throttleTimer = null;
  let heartbeatInterval = null;
  let drawerTimerInterval = null;
  let canvasWidth = 0, canvasHeight = 0;

  // برای برگردان (Undo)
  let undoStack = [];
  let isUndoRedoing = false;

  // همگام‌سازی نقاشی با شماره ترتیبی
  let drawerEvents = [];
  let currentSeq = 0;
  let expectedSeq = 1;
  let syncing = false;

  // ========== توابع کمکی ==========
  function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = sec % 60;
    return `${m}:${s < 10 ? '0' : ''}${s}`;
  }

  function addMessageToUI(text, type, senderName = '') {
    const div = document.createElement('div');
    div.className = `message ${type === 'self' ? 'self' : ''} ${type === 'system' ? 'system' : ''}`;
    if (type === 'system') div.textContent = `🔹 ${text}`;
    else if (type === 'self') div.textContent = text;
    else div.textContent = `${senderName ? senderName+': ' : ''}${text}`;
    dom.messageContainer.appendChild(div);
    dom.messageContainer.scrollTop = dom.messageContainer.scrollHeight;
  }

  function addMessage(text, sender = 'other', senderName = '') {
    if (sender === 'self') addMessageToUI(text, 'self');
    else if (sender === 'system') addMessageToUI(text, 'system');
    else addMessageToUI(text, 'other', senderName);
    chatHistory.unshift({ text, senderName: (sender === 'self' ? myName : senderName), isSystem: (sender === 'system'), timestamp: Date.now() });
    if (chatHistory.length > MAX_HISTORY) chatHistory.pop();
  }

  function loadHistoryToUI(history) {
    dom.messageContainer.innerHTML = '';
    [...history].reverse().forEach(msg => {
      const div = document.createElement('div');
      div.className = `message ${msg.isSystem ? 'system' : ''}`;
      if (msg.isSystem) div.textContent = `🔹 ${msg.text}`;
      else div.textContent = `${msg.senderName}: ${msg.text}`;
      dom.messageContainer.appendChild(div);
    });
    dom.messageContainer.scrollTop = dom.messageContainer.scrollHeight;
  }

  function updateUsersUI() {
    const list = [];
    list.push({ id: USER_ID, name: myName, score: users.get(USER_ID)?.score || 0, isSelf: true });
    for (let [uid, u] of users.entries()) {
      if (uid !== USER_ID) list.push({ id: uid, name: u.name, score: u.score || 0, isSelf: false });
    }
    list.sort((a,b) => b.score - a.score || a.name.localeCompare(b.name));
    dom.usersContainer.innerHTML = '';
    for (let u of list) {
      let cls = 'user-chip';
      if (currentDrawer && currentDrawer.userId === u.id) cls += ' drawer-chip';
      dom.usersContainer.innerHTML += `<div class="${cls}">${u.name}${u.isSelf ? ' (من)' : ''} <span class="score">${u.score}</span></div>`;
    }
    dom.scoreDisplay.textContent = `🏆 ${users.get(USER_ID)?.score || 0}`;
  }

  function addScore(userId, points) {
    let u = users.get(userId);
    if (u) {
      u.score = (u.score || 0) + points;
      users.set(userId, u);
    } else if (userId === USER_ID) {
      users.set(USER_ID, { name: myName, joinTime, score: points });
    }
    updateUsersUI();
  }

  // ========== Heartbeat و مدیریت کاربران ==========
  function startHeartbeat() {
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    heartbeatInterval = setInterval(() => {
      if (mqttClient?.connected) {
        mqttClient.publish(`doodle/${roomId}/ping/${USER_ID}`, JSON.stringify({ userId: USER_ID, timestamp: Date.now() }));
      }
    }, HEARTBEAT_INTERVAL);
  }

  function handlePing(userId) {
    if (userId === USER_ID) return;
    if (!users.has(userId)) return;
    const u = users.get(userId);
    u.lastPing = Date.now();
    if (u.timer) clearTimeout(u.timer);
    u.timer = setTimeout(() => {
      if (users.has(userId)) {
        const name = users.get(userId).name;
        users.delete(userId);
        addMessage(`${name} قطع شد.`, 'system');
        updateUsersUI();
        if (currentDrawer && currentDrawer.userId === userId) {
          currentDrawer = null;
          dom.roleDisplay.textContent = '🔍 حدس بزن';
          dom.requestDrawBtn.disabled = false;
          stopDrawerTimer();
          updateWordDisplay();
          updateUsersUI();
          mqttClient.publish(`doodle/${roomId}/drawer`, '', { retain: true });
        }
      }
    }, HEARTBEAT_TIMEOUT);
  }

  function publishMyInfo() {
    if (!mqttClient?.connected) return;
    const myScore = users.get(USER_ID)?.score || 0;
    mqttClient.publish(`doodle/${roomId}/info`, JSON.stringify({ userId: USER_ID, name: myName, joinTime, score: myScore }));
  }

  function startInfoPublish() {
    setInterval(() => publishMyInfo(), 5000);
    setTimeout(() => publishMyInfo(), 500);
  }

  // ========== بوم و نقاشی ==========
  function saveCanvasState() {
    if (isUndoRedoing) return;
    const imageData = ctx.getImageData(0, 0, canvasWidth, canvasHeight);
    undoStack.push(imageData);
    if (undoStack.length > UNDO_STACK_SIZE) undoStack.shift();
  }

  function undo() {
    if (undoStack.length === 0) return;
    isUndoRedoing = true;
    const prev = undoStack.pop();
    ctx.putImageData(prev, 0, 0);
    isUndoRedoing = false;
    if (isDrawer) {
      // ارسال تصویر کامل برای همگام‌سازی (ساده‌ترین راه)
      sendCanvasSync();
    }
  }

  // Flood fill (سطل رنگ)
  function floodFill(x, y, targetColor, fillColor) {
    if (targetColor === fillColor) return;
    const width = canvasWidth;
    const height = canvasHeight;
    const imageData = ctx.getImageData(0, 0, width, height);
    const data = imageData.data;
    function getPixelIndex(x, y) { return (y * width + x) * 4; }
    function matchColor(idx) {
      return data[idx] === targetColor.r && data[idx+1] === targetColor.g && data[idx+2] === targetColor.b && data[idx+3] === targetColor.a;
    }
    const target = { r: targetColor.r, g: targetColor.g, b: targetColor.b, a: targetColor.a };
    const fill = { r: fillColor.r, g: fillColor.g, b: fillColor.b, a: fillColor.a };
    const stack = [{x, y}];
    const visited = new Uint8Array(width * height);
    while (stack.length) {
      const {x: cx, y: cy} = stack.pop();
      if (cx < 0 || cx >= width || cy < 0 || cy >= height) continue;
      const idx = getPixelIndex(cx, cy);
      if (!matchColor(idx)) continue;
      if (visited[cy*width + cx]) continue;
      visited[cy*width + cx] = 1;
      data[idx] = fill.r;
      data[idx+1] = fill.g;
      data[idx+2] = fill.b;
      data[idx+3] = fill.a;
      stack.push({x: cx+1, y: cy});
      stack.push({x: cx-1, y: cy});
      stack.push({x: cx, y: cy+1});
      stack.push({x: cx, y: cy-1});
    }
    ctx.putImageData(imageData, 0, 0);
    saveCanvasState();
  }

  function fillAtMouse(e) {
    if (!isDrawer) return;
    e.preventDefault();
    const pos = getCanvasCoords(e);
    const x = Math.floor(pos.x);
    const y = Math.floor(pos.y);
    if (x < 0 || x >= canvasWidth || y < 0 || y >= canvasHeight) return;
    const imageData = ctx.getImageData(x, y, 1, 1);
    const targetColor = { r: imageData.data[0], g: imageData.data[1], b: imageData.data[2], a: imageData.data[3] };
    const fillColor = hexToRgba(dom.colorPicker.value);
    floodFill(x, y, targetColor, fillColor);
    sendCanvasSync();
  }

  function hexToRgba(hex) {
    let r = parseInt(hex.slice(1,3), 16);
    let g = parseInt(hex.slice(3,5), 16);
    let b = parseInt(hex.slice(5,7), 16);
    return { r, g, b, a: 255 };
  }

  function resizeCanvas() {
    const rect = dom.canvas.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;
    let saved = null;
    if (canvasWidth > 0 && canvasHeight > 0) {
      saved = ctx.getImageData(0, 0, canvasWidth, canvasHeight);
    }
    canvasWidth = rect.width;
    canvasHeight = rect.height;
    dom.canvas.width = canvasWidth;
    dom.canvas.height = canvasHeight;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (saved) {
      ctx.putImageData(saved, 0, 0);
    }
  }
  resizeCanvas();
  window.addEventListener('resize', () => setTimeout(resizeCanvas, 100));

  function setDrawToolsEnabled(enabled) {
    dom.toolbar.style.display = enabled ? 'flex' : 'none';
  }

  function getCanvasCoords(e) {
    const rect = dom.canvas.getBoundingClientRect();
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    const xCSS = clientX - rect.left;
    const yCSS = clientY - rect.top;
    const scaleX = canvasWidth / rect.width;
    const scaleY = canvasHeight / rect.height;
    return { x: xCSS * scaleX, y: yCSS * scaleY };
  }

  function normalize(x, y) {
    if (canvasWidth === 0 || canvasHeight === 0) return { xn: 0, yn: 0 };
    return { xn: x / canvasWidth, yn: y / canvasHeight };
  }

  function denormalize(xn, yn) {
    return { x: xn * canvasWidth, y: yn * canvasHeight };
  }

  function sendDraw(type, x, y) {
    if (!mqttClient?.connected || !isDrawer) return;
    const { xn, yn } = normalize(x, y);
    currentSeq++;
    const ev = {
      type: 'draw_event',
      seq: currentSeq,
      drawType: type,
      xn, yn,
      color: dom.colorPicker.value,
      size: dom.brushSize.value,
      userId: USER_ID
    };
    drawerEvents.push(ev);
    mqttClient.publish(`doodle/${roomId}/draw_event`, JSON.stringify(ev));
  }

  function flushDraw() {
    if (throttleTimer) clearTimeout(throttleTimer);
    throttleTimer = null;
    if (pendingDraw) {
      sendDraw(pendingDraw.drawType, pendingDraw.x, pendingDraw.y);
      pendingDraw = null;
    }
  }

  function throttleDraw(type, x, y) {
    if (pendingDraw && pendingDraw.drawType === 'move' && type === 'move') {
      pendingDraw = { drawType: type, x, y };
      return;
    }
    if (pendingDraw) flushDraw();
    pendingDraw = { drawType: type, x, y };
    if (!throttleTimer) throttleTimer = setTimeout(flushDraw, THROTTLE_MS);
  }

  function startDraw(e) {
    if (!isDrawer) return;
    e.preventDefault();
    saveCanvasState();
    drawing = true;
    const pos = getCanvasCoords(e);
    lastX = pos.x; lastY = pos.y;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    throttleDraw('start', lastX, lastY);
  }

  function onDraw(e) {
    if (!drawing || !isDrawer) return;
    e.preventDefault();
    const pos = getCanvasCoords(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = dom.colorPicker.value;
    ctx.lineWidth = dom.brushSize.value;
    ctx.stroke();
    throttleDraw('move', pos.x, pos.y);
    lastX = pos.x; lastY = pos.y;
  }

  function endDraw(e) {
    if (!isDrawer) return;
    drawing = false;
    ctx.closePath();
    throttleDraw('end');
    flushDraw();
  }

  function executeDrawEvent(data) {
    const { x, y } = denormalize(data.xn, data.yn);
    if (data.drawType === 'start') {
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.strokeStyle = data.color;
      ctx.lineWidth = data.size;
    } else if (data.drawType === 'move') {
      ctx.lineTo(x, y);
      ctx.stroke();
    } else if (data.drawType === 'end') {
      ctx.closePath();
    } else if (data.drawType === 'clear') {
      ctx.clearRect(0, 0, canvasWidth, canvasHeight);
    }
  }

  function onDrawEvent(data) {
    if (data.userId !== currentDrawer?.userId) return;
    if (data.userId === USER_ID) return;
    if (data.seq === expectedSeq) {
      executeDrawEvent(data);
      expectedSeq++;
    } else if (data.seq > expectedSeq) {
      requestSync(expectedSeq, data.seq-1);
    }
  }

  function requestSync(from, to) {
    if (syncing) return;
    syncing = true;
    mqttClient.publish(`doodle/${roomId}/sync_request`, JSON.stringify({
      requester: USER_ID,
      fromSeq: from, toSeq: to,
      drawerId: currentDrawer.userId
    }));
  }

  function onSyncRequest(data) {
    if (!isDrawer || currentDrawer?.userId !== data.drawerId) return;
    const events = drawerEvents.filter(ev => ev.seq >= data.fromSeq && ev.seq <= data.toSeq);
    if (events.length) {
      mqttClient.publish(`doodle/${roomId}/sync_response`, JSON.stringify({
        target: data.requester,
        events
      }));
    }
  }

  function onSyncResponse(data) {
    if (data.target !== USER_ID) return;
    if (data.events && data.events.length) {
      for (let ev of data.events) executeDrawEvent(ev);
      expectedSeq = data.events[data.events.length-1].seq + 1;
    }
    syncing = false;
  }

  function sendFullSync(targetUserId) {
    if (!isDrawer || !mqttClient) return;
    if (drawerEvents.length === 0) return;
    mqttClient.publish(`doodle/${roomId}/full_sync`, JSON.stringify({
      target: targetUserId,
      events: drawerEvents,
      lastSeq: currentSeq
    }));
  }

  function onFullSync(data) {
    if (data.target !== USER_ID) return;
    ctx.clearRect(0, 0, canvasWidth, canvasHeight);
    for (let ev of data.events) executeDrawEvent(ev);
    expectedSeq = data.lastSeq + 1;
  }

  function sendCanvasSync() {
    if (!isDrawer || !mqttClient) return;
    try {
      const dataUrl = dom.canvas.toDataURL('image/png');
      mqttClient.publish(`doodle/${roomId}/canvas_sync`, JSON.stringify({ image: dataUrl, userId: USER_ID }));
    } catch(e) {}
  }

  function receiveCanvasSync(data) {
    if (isDrawer || data.userId === USER_ID) return;
    const img = new Image();
    img.onload = () => {
      if (canvasWidth && canvasHeight) {
        ctx.drawImage(img, 0, 0, canvasWidth, canvasHeight);
      }
    };
    img.src = data.image;
  }

  function clearCanvas(send = true) {
    ctx.clearRect(0, 0, canvasWidth, canvasHeight);
    if (send && isDrawer && mqttClient) {
      currentSeq++;
      const clearEv = {
        type: 'draw_event',
        seq: currentSeq,
        drawType: 'clear',
        xn: 0, yn: 0,
        userId: USER_ID
      };
      drawerEvents.push(clearEv);
      mqttClient.publish(`doodle/${roomId}/draw_event`, JSON.stringify(clearEv));
    }
    saveCanvasState();
  }

  // ========== مدیریت نقاش ==========
  function updateWordDisplay() {
    if (isDrawer && currentDrawer && currentDrawer.word) {
      dom.wordDisplay.textContent = `🎨 کلمه تو: ${currentDrawer.word}`;
    } else if (currentDrawer && currentDrawer.word) {
      const word = currentDrawer.word;
      let hidden = word[0] + ' _'.repeat(word.length - 1);
      dom.wordDisplay.textContent = `🔍 کلمه: ${hidden} (${word.length} حرف)`;
    } else {
      dom.wordDisplay.textContent = '';
    }
  }

  function generateNewWord() {
    return WORDS[Math.floor(Math.random() * WORDS.length)];
  }

  function startDrawerTimer(startTime) {
    if (drawerTimerInterval) clearInterval(drawerTimerInterval);
    drawerTimerInterval = setInterval(() => {
      if (!currentDrawer) {
        clearInterval(drawerTimerInterval);
        drawerTimerInterval = null;
        dom.drawerTimer.textContent = '';
        return;
      }
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const remaining = Math.max(DRAW_TIME - elapsed, 0);
      dom.drawerTimer.textContent = `⏱ ${formatTime(remaining)}`;
      if (remaining <= 0) {
        clearInterval(drawerTimerInterval);
        drawerTimerInterval = null;
        if (currentDrawer.userId === USER_ID && isDrawer) {
          addMessage('⏰ زمان نقاشی تمام شد.', 'system');
          resignDrawer();
        } else if (currentDrawer) {
          currentDrawer = null;
          dom.roleDisplay.textContent = '🔍 حدس بزن';
          dom.requestDrawBtn.disabled = false;
          updateWordDisplay();
          dom.drawerTimer.textContent = '';
          updateUsersUI();
        }
      }
    }, 1000);
  }

  function stopDrawerTimer() {
    if (drawerTimerInterval) clearInterval(drawerTimerInterval);
    drawerTimerInterval = null;
    dom.drawerTimer.textContent = '';
  }

  function becomeDrawer() {
    if (isDrawer || currentDrawer) return;
    const now = Date.now();
    const word = generateNewWord();
    currentDrawer = { userId: USER_ID, name: myName, startTime: now, word: word };
    isDrawer = true;
    drawerEvents = [];
    currentSeq = 0;
    expectedSeq = 1;
    clearCanvas(true);
    setDrawToolsEnabled(true);
    dom.roleDisplay.textContent = '🖌️ تو نقاشی';
    dom.requestDrawBtn.disabled = true;
    dom.requestDrawBtn.textContent = '🎨 در حال نقاشی...';
    updateWordDisplay();
    startDrawerTimer(now);
    mqttClient.publish(`doodle/${roomId}/drawer`, JSON.stringify(currentDrawer), { retain: true });
    saveCanvasState();
  }

  function resignDrawer() {
    if (!isDrawer) return;
    isDrawer = false;
    currentDrawer = null;
    clearCanvas(true);
    setDrawToolsEnabled(false);
    dom.roleDisplay.textContent = '🔍 حدس بزن';
    updateWordDisplay();
    stopDrawerTimer();
    dom.requestDrawBtn.disabled = false;
    dom.requestDrawBtn.textContent = '🎨 من می‌خواهم نقاشی کنم';
    undoStack = [];
    mqttClient.publish(`doodle/${roomId}/drawer`, '', { retain: true });
    mqttClient.publish(`doodle/${roomId}/drawer_finished`, JSON.stringify({ userId: USER_ID, reason: 'resign' }));
  }

  function setDrawerFromRemote(drawer) {
    if (!drawer) return;
    if (drawer.userId === USER_ID) return;
    if (isDrawer) {
      resignDrawer();
    }
    currentDrawer = drawer;
    isDrawer = false;
    setDrawToolsEnabled(false);
    dom.roleDisplay.textContent = `🖌️ ${drawer.name} نقاشی می‌کند`;
    dom.requestDrawBtn.disabled = true;
    dom.requestDrawBtn.textContent = '🎨 در حال نقاشی...';
    updateWordDisplay();
    startDrawerTimer(drawer.startTime);
    expectedSeq = 1;
    ctx.clearRect(0, 0, canvasWidth, canvasHeight);
    updateUsersUI();
    setTimeout(() => {
      if (mqttClient?.connected && currentDrawer && currentDrawer.userId === drawer.userId) {
        mqttClient.publish(`doodle/${roomId}/full_sync_request`, JSON.stringify({ target: USER_ID, drawerId: drawer.userId }));
      }
    }, 500);
  }

  // ========== چت و حدس ==========
  function sendChat(text) {
    if (!mqttClient?.connected) return;
    mqttClient.publish(`doodle/${roomId}/chat`, JSON.stringify({ type: 'chat', text, userId: USER_ID, name: myName, timestamp: Date.now() }));
    addMessage(text, 'self');
    if (!isDrawer && currentDrawer && currentDrawer.word && text.trim().toLowerCase() === currentDrawer.word.toLowerCase()) {
      const remaining = Math.max(0, DRAW_TIME - Math.floor((Date.now() - currentDrawer.startTime) / 1000));
      mqttClient.publish(`doodle/${roomId}/chat`, JSON.stringify({
        type: 'correct_guess',
        guesserId: USER_ID,
        guesserName: myName,
        drawerId: currentDrawer.userId,
        remainingSeconds: remaining
      }));
      addScore(USER_ID, remaining);
      addMessage(`🎉 شما کلمه را درست حدس زدید! +${remaining} امتیاز`, 'system');
    }
  }

  // ========== MQTT با تنظیمات پایدار ==========
  function onMqttMessage(topic, message) {
    const payload = message.toString();
    if (!payload) return;

    if (topic === `doodle/${roomId}/chat`) {
      try {
        const data = JSON.parse(payload);
        if (data.type === 'chat') {
          if (data.userId !== USER_ID) addMessage(data.text, 'other', data.name);
        } else if (data.type === 'correct_guess') {
          // امتیازدهی به هر دو نفر
          if (data.guesserId !== USER_ID) addScore(data.guesserId, data.remainingSeconds);
          addScore(data.drawerId, data.remainingSeconds);
          addMessage(`🎉 ${data.guesserName} کلمه را درست حدس زد! +${data.remainingSeconds} امتیاز`, 'system');
          if (currentDrawer && currentDrawer.userId === data.drawerId) {
            if (currentDrawer.userId === USER_ID && isDrawer) {
              resignDrawer();
            } else {
              currentDrawer = null;
              dom.roleDisplay.textContent = '🔍 حدس بزن';
              dom.requestDrawBtn.disabled = false;
              stopDrawerTimer();
              updateWordDisplay();
              updateUsersUI();
            }
          }
        }
      } catch(e) {}
    }
    else if (topic === `doodle/${roomId}/draw_event`) {
      try {
        const data = JSON.parse(payload);
        if (data.userId === currentDrawer?.userId) onDrawEvent(data);
      } catch(e) {}
    }
    else if (topic === `doodle/${roomId}/sync_request`) {
      try { onSyncRequest(JSON.parse(payload)); } catch(e) {}
    }
    else if (topic === `doodle/${roomId}/sync_response`) {
      try { onSyncResponse(JSON.parse(payload)); } catch(e) {}
    }
    else if (topic === `doodle/${roomId}/full_sync_request`) {
      try {
        const data = JSON.parse(payload);
        if (isDrawer && data.drawerId === USER_ID && data.target !== USER_ID) sendFullSync(data.target);
      } catch(e) {}
    }
    else if (topic === `doodle/${roomId}/full_sync`) {
      try { onFullSync(JSON.parse(payload)); } catch(e) {}
    }
    else if (topic === `doodle/${roomId}/drawer`) {
      if (payload) {
        try {
          const drawer = JSON.parse(payload);
          setDrawerFromRemote(drawer);
        } catch(e) {}
      } else {
        if (!isDrawer && currentDrawer) {
          currentDrawer = null;
          dom.roleDisplay.textContent = '🔍 حدس بزن';
          dom.requestDrawBtn.disabled = false;
          stopDrawerTimer();
          updateWordDisplay();
          updateUsersUI();
        }
      }
    }
    else if (topic === `doodle/${roomId}/drawer_finished`) {
      if (!isDrawer && currentDrawer) {
        currentDrawer = null;
        dom.roleDisplay.textContent = '🔍 حدس بزن';
        dom.requestDrawBtn.disabled = false;
        stopDrawerTimer();
        updateWordDisplay();
        updateUsersUI();
      }
    }
    else if (topic === `doodle/${roomId}/canvas_sync`) {
      try {
        const data = JSON.parse(payload);
        if (!isDrawer && data.userId !== USER_ID) receiveCanvasSync(data);
      } catch(e) {}
    }
    else if (topic === `doodle/${roomId}/info`) {
      try {
        const data = JSON.parse(payload);
        if (data.userId !== USER_ID) {
          if (!users.has(data.userId)) {
            users.set(data.userId, {
              name: data.name,
              joinTime: data.joinTime,
              score: data.score || 0,
              lastPing: Date.now(),
              timer: null
            });
            addMessage(`${data.name} وارد اتاق شد.`, 'system');
          } else {
            const u = users.get(data.userId);
            u.lastPing = Date.now();
            if (data.score !== undefined) u.score = data.score;
            if (u.timer) clearTimeout(u.timer);
          }
          handlePing(data.userId);
          updateUsersUI();
        }
      } catch(e) {}
    }
    else if (topic.startsWith(`doodle/${roomId}/ping/`)) {
      const userId = topic.split('/').pop();
      handlePing(userId);
    }
    else if (topic === `doodle/${roomId}/history_update`) {
      try {
        const data = JSON.parse(payload);
        chatHistory = data.history.slice(0, MAX_HISTORY);
        loadHistoryToUI(chatHistory);
      } catch(e) {}
    }
    else if (topic === `doodle/${roomId}/request_history`) {
      try {
        const data = JSON.parse(payload);
        if (data.userId !== USER_ID) {
          mqttClient.publish(`doodle/${roomId}/history_update`, JSON.stringify({ history: chatHistory.slice(0, MAX_HISTORY) }));
        }
      } catch(e) {}
    }
  }

  function initMqtt() {
    if (typeof window.mqtt === 'undefined') {
      dom.statusLabel.innerText = '❌ کتابخانه MQTT بارگذاری نشد';
      return;
    }
    const options = {
      keepalive: 30,
      reconnectPeriod: 2000,
      connectTimeout: 30 * 1000,
      will: {
        topic: `doodle/${roomId}/ping/${USER_ID}`,
        payload: '',
        retain: false
      }
    };
    mqttClient = window.mqtt.connect('wss://broker.hivemq.com:8884/mqtt', options);
    mqttClient.on('connect', () => {
      dom.statusLabel.innerText = '✅ متصل';
      const topics = ['chat', 'draw_event', 'sync_request', 'sync_response', 'full_sync_request', 'full_sync', 'drawer', 'drawer_finished', 'canvas_sync', 'info', 'ping/+', 'history_update', 'request_history'];
      topics.forEach(t => mqttClient.subscribe(`doodle/${roomId}/${t}`));
      mqttClient.on('message', onMqttMessage);
      publishMyInfo();
      startInfoPublish();
      startHeartbeat();
      setTimeout(() => {
        if (mqttClient?.connected) mqttClient.publish(`doodle/${roomId}/request_history`, JSON.stringify({ userId: USER_ID }));
      }, 500);
    });
    mqttClient.on('error', (err) => { console.error(err); dom.statusLabel.innerText = '❌ خطا'; });
    mqttClient.on('close', () => { dom.statusLabel.innerText = '⚠️ قطع شده'; });
    window.addEventListener('beforeunload', () => {
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      if (mqttClient?.connected) mqttClient.end();
    });
  }

  // ========== راه‌اندازی ==========
  dom.startBtn.onclick = () => {
    const name = dom.nameInput.value.trim();
    if (!name) return alert('نام خود را وارد کنید');
    myName = name;
    roomId = dom.roomInput.value.trim() || 'doodle_room';
    joinTime = Date.now();
    users.set(USER_ID, { name: myName, joinTime, score: 0 });
    dom.loginBox.style.display = 'none';
    dom.app.style.display = 'flex';
    resizeCanvas();
    initMqtt();
    updateUsersUI();
  };

  dom.requestDrawBtn.onclick = () => {
    if (isDrawer) return;
    if (!currentDrawer) {
      becomeDrawer();
    } else {
      addMessage('در حال حاضر نقاشی فعال است. لطفاً چند لحظه دیگر امتحان کنید.', 'system');
    }
  };

  dom.undoBtn.onclick = () => undo();
  dom.fillBtn.onclick = (e) => {
    e.preventDefault();
    fillAtMouse(e);
  };
  dom.clearBtn.onclick = () => clearCanvas(true);
  dom.sendBtn.onclick = () => {
    const text = dom.chatInput.value.trim();
    if (text) { sendChat(text); dom.chatInput.value = ''; }
  };
  dom.chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') dom.sendBtn.click(); });

  dom.canvas.addEventListener('mousedown', startDraw);
  dom.canvas.addEventListener('mousemove', onDraw);
  dom.canvas.addEventListener('mouseup', endDraw);
  dom.canvas.addEventListener('mouseleave', endDraw);
  dom.canvas.addEventListener('touchstart', startDraw, { passive: false });
  dom.canvas.addEventListener('touchmove', onDraw, { passive: false });
  dom.canvas.addEventListener('touchend', endDraw);

  setDrawToolsEnabled(false);
  dom.roleDisplay.textContent = 'منتظر اتصال...';
})();
</script>
</body>
</html>
